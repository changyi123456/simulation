<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密度測量實驗室 - 數據追蹤版</title>
    <!-- 引入 Tailwind CSS (負責網頁美化與排版) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel (讓瀏覽器能直接看懂 React 的語法) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* 隱藏外層捲軸，讓嵌入畫面更漂亮 */
        body { margin: 0; padding: 0; overflow-x: hidden; }
        /* 優化拖曳時的視覺效果 */
        [draggable="true"] { user-select: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 1. Interaction Logger (數據追蹤工具)
        // ==========================================
        const STORAGE_KEY = "TaskInteractionData";
        let interactionHistory = [];

        const InteractionLogger = {
            init: function() {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try {
                        const parsed = JSON.parse(stored);
                        if (Array.isArray(parsed)) {
                            interactionHistory = parsed;
                        }
                    } catch (e) {
                        console.warn("Failed to parse existing interaction data", e);
                        interactionHistory = [];
                    }
                }
                this.log('Initialize', { timestamp: new Date().toISOString(), sim: "Density_Measurement_Lab" });
            },

            log: function(action, details = {}) {
                const event = {
                    timestamp: new Date().toISOString(),
                    action: action,
                    details: details
                };
                interactionHistory.push(event);
                // 防止資料過大，保留最新 500 筆
                if (interactionHistory.length > 500) {
                    interactionHistory.shift();
                }
                localStorage.setItem(STORAGE_KEY, JSON.stringify(interactionHistory));
            },

            clear: function() {
                interactionHistory = [];
                localStorage.setItem(STORAGE_KEY, JSON.stringify([]));
            }
        };

        // ==========================================
        // 2. React 應用程式
        // ==========================================
        const { useState, useEffect } = React;

        const OBJECTS = {
          A: { id: 'A', name: '沉體 A', mass: 45.5, volume: 15.0, color: 'bg-stone-500', shape: 'rounded-[40%_60%_70%_30%/40%_50%_60%_50%]', size: 'w-10 h-10', text: 'text-white' },
          B: { id: 'B', name: '沉體 B', mass: 112.0, volume: 40.0, color: 'bg-slate-700', shape: 'rounded-[60%_40%_30%_70%/50%_60%_40%_50%]', size: 'w-14 h-14', text: 'text-white' }
        };

        const MAX_WATER = 120.0;

        function App() {
          // 初始化 Logger
          useEffect(() => {
            InteractionLogger.init();
          }, []);

          const [locations, setLocations] = useState({ A: 'table', B: 'table' });
          const [baseWaterVolume, setBaseWaterVolume] = useState(50.0);
          const [isBalanceOn, setIsBalanceOn] = useState(true);
          const [tareOffset, setTareOffset] = useState(0);

          const [formData, setFormData] = useState({
            objectName: 'A',
            mass: '',
            initialVolume: '',
            finalVolume: '',
            calcVolume: '',
            density: ''
          });

          const [records, setRecords] = useState([]);
          const [errorMsg, setErrorMsg] = useState("");
          const [showClearConfirm, setShowClearConfirm] = useState(false);

          const handleDragStart = (e, id) => {
            e.dataTransfer.setData('objectId', id);
          };

          const handleDragOver = (e) => {
            e.preventDefault();
          };

          const handleDrop = (e, zone) => {
            e.preventDefault();
            const objectId = e.dataTransfer.getData('objectId');
            if (!objectId) return;

            // 紀錄物體移動事件
            const fromZone = locations[objectId];
            if (fromZone !== zone) {
              InteractionLogger.log('MoveObject', { object: objectId, from: fromZone, to: zone });
            }

            setLocations(prev => {
              const newLocations = { ...prev };
              if (zone !== 'table') {
                Object.keys(newLocations).forEach(key => {
                  if (newLocations[key] === zone && key !== objectId) {
                    newLocations[key] = 'table';
                  }
                });
              }
              newLocations[objectId] = zone;
              return newLocations;
            });
          };

          const rawMass = Object.keys(locations).reduce((total, key) => {
            return locations[key] === 'balance' ? total + OBJECTS[key].mass : total;
          }, 0);

          const displayMass = rawMass - tareOffset;

          const handleTare = () => {
            if (isBalanceOn) {
              setTareOffset(rawMass);
              // 紀錄歸零事件
              InteractionLogger.log('TareBalance', { offset: rawMass });
            }
          };

          const handlePower = () => {
            setIsBalanceOn(prev => {
              const newState = !prev;
              // 紀錄開關機事件
              InteractionLogger.log('ToggleBalancePower', { isOn: newState });
              return newState;
            });
            if (!isBalanceOn) {
              setTareOffset(0);
            }
          };

          const currentWaterVolume = Object.keys(locations).reduce((total, key) => {
            if (locations[key] === 'beaker') {
              if (baseWaterVolume === 0) {
                return total;
              } else if (baseWaterVolume < 20) {
                return total + (OBJECTS[key].volume * 0.55);
              } else {
                return total + OBJECTS[key].volume;
              }
            }
            return total;
          }, baseWaterVolume);

          const handleAddWater = () => {
            setBaseWaterVolume(prev => {
              const newVal = Math.min(prev + 10, 90);
              // 紀錄加水事件
              InteractionLogger.log('ChangeWaterVolume', { action: 'add', newVolume: newVal });
              return newVal;
            });
          };

          const handleRemoveWater = () => {
            setBaseWaterVolume(prev => {
              const newVal = Math.max(prev - 10, 0);
              // 紀錄倒水事件
              InteractionLogger.log('ChangeWaterVolume', { action: 'remove', newVolume: newVal });
              return newVal;
            });
          };

          const handleInputChange = (e) => {
            const { name, value } = e.target;
            setFormData(prev => ({ ...prev, [name]: value }));
          };

          const handleRecord = () => {
            if (!formData.mass && !formData.initialVolume && !formData.finalVolume && !formData.calcVolume && !formData.density) {
              setErrorMsg("請輸入至少一項測量數據後再紀錄！");
              return;
            }
            setErrorMsg("");
            
            // 紀錄儲存數據事件
            InteractionLogger.log('SaveRecord', { data: formData });

            setRecords(prev => [...prev, { ...formData, id: Date.now() }]);
            setFormData(prev => ({
              ...prev,
              mass: '',
              initialVolume: '',
              finalVolume: '',
              calcVolume: '',
              density: ''
            }));
          };

          const handleClearRecords = () => {
            // 紀錄清除數據事件
            InteractionLogger.log('ClearRecords');
            
            setRecords([]);
            setShowClearConfirm(false);
          };

          const RenderObject = ({ id, currentZone }) => {
            if (locations[id] !== currentZone) return null;
            const obj = OBJECTS[id];
            return (
              <div
                draggable
                onDragStart={(e) => handleDragStart(e, id)}
                className={`${obj.color} ${obj.shape} ${obj.size} ${obj.text} flex items-center justify-center font-bold text-sm shadow-md cursor-grab active:cursor-grabbing hover:ring-4 hover:ring-yellow-400 transition-all absolute z-10`}
                title={`拖曳 ${obj.name}`}
                style={{
                  position: currentZone === 'table' ? 'relative' : 'absolute',
                  bottom: currentZone === 'beaker' ? '10px' : (currentZone === 'balance' ? '15px' : 'auto'),
                  left: currentZone === 'table' ? 'auto' : '50%',
                  transform: currentZone === 'table' ? 'none' : 'translateX(-50%)'
                }}
              >
                {id}
              </div>
            );
          };

          return (
            <div className="min-h-screen bg-gray-100 p-4 sm:p-6 font-sans text-gray-800 flex flex-col lg:flex-row gap-6 selection:bg-blue-200">
              {/* 左側：實驗模擬區 */}
              <div className="flex-grow w-full lg:w-2/3 bg-white rounded-xl shadow-lg p-4 sm:p-6 flex flex-col">
                <div className="mb-4 border-b pb-4">
                  <h1 className="text-xl sm:text-2xl font-bold text-gray-800 flex items-center">
                    🧪 物質密度測量實驗
                  </h1>
                  <p className="text-sm sm:text-base text-gray-600 mt-2">
                    <strong>操作說明：</strong> 請使用滑鼠將桌面上的「不規則沉體」拖曳至「電子秤」或「量杯」中測量。觀察數據後，手動填寫至右側紀錄表中。
                  </p>
                </div>

                <div className="flex-grow flex relative mt-4">
                  {/* 電子秤區域 */}
                  <div 
                    className="w-1/2 flex flex-col items-center justify-end pb-10 border-r border-gray-200"
                    onDragOver={handleDragOver}
                    onDrop={(e) => handleDrop(e, 'balance')}
                  >
                    <div className="text-base sm:text-lg font-bold mb-8 text-gray-700">電子秤</div>
                    <div className="relative flex flex-col items-center">
                      <div className="w-32 sm:w-40 h-8 bg-gray-300 rounded-t-full border-2 border-gray-400 relative flex justify-center items-end">
                         <RenderObject id="A" currentZone="balance" />
                         <RenderObject id="B" currentZone="balance" />
                      </div>
                      <div className="w-40 sm:w-48 h-24 bg-gray-200 border-2 border-gray-400 rounded-b-lg shadow-inner flex items-center justify-center flex-col relative z-20">
                        <div className={`border-2 border-gray-500 w-[85%] h-12 rounded flex items-center justify-end px-2 sm:px-3 shadow-inner font-mono text-xl sm:text-2xl font-bold ${isBalanceOn ? 'bg-green-100 text-gray-800' : 'bg-green-900/20 text-transparent'}`}>
                          {isBalanceOn ? (
                            <>
                              {displayMass.toFixed(1)} <span className="text-xs sm:text-sm ml-1 text-gray-500">g</span>
                            </>
                          ) : "000.0 g"}
                        </div>
                        <div className="text-[10px] sm:text-xs text-gray-500 mt-2 flex gap-2 sm:gap-4">
                          <button onClick={handleTare} className="bg-gray-300 px-2 py-1 rounded shadow hover:bg-gray-400 active:translate-y-px transition-colors">TARE</button>
                          <button onClick={handlePower} className={`px-2 py-1 rounded shadow active:translate-y-px transition-colors text-white ${isBalanceOn ? 'bg-red-400 hover:bg-red-500' : 'bg-green-500 hover:bg-green-600'}`}>
                            {isBalanceOn ? 'OFF' : 'ON'}
                          </button>
                        </div>
                      </div>
                    </div>
                    <div className="mt-4 text-xs sm:text-sm text-gray-400 text-center">拖曳至秤盤上</div>
                  </div>

                  {/* 量杯區域 */}
                  <div 
                    className="w-1/2 flex flex-col items-center justify-end pb-10 relative"
                    onDragOver={handleDragOver}
                    onDrop={(e) => handleDrop(e, 'beaker')}
                  >
                    <div className="text-base sm:text-lg font-bold mb-2 text-gray-700">量杯 (120mL)</div>
                    
                    <div className="flex gap-2 mb-6">
                      <button onClick={handleAddWater} className="bg-blue-500 text-white px-2 sm:px-3 py-1 rounded shadow hover:bg-blue-600 active:translate-y-px text-[10px] sm:text-xs font-bold transition-colors">➕ 加水</button>
                      <button onClick={handleRemoveWater} className="bg-blue-200 text-blue-900 px-2 sm:px-3 py-1 rounded shadow hover:bg-blue-300 active:translate-y-px text-[10px] sm:text-xs font-bold transition-colors">➖ 倒水</button>
                    </div>
                    
                    <div className="relative w-24 sm:w-32 h-48 sm:h-64 border-l-4 border-r-4 border-b-4 border-gray-300 rounded-b-xl bg-blue-50/30 overflow-hidden flex flex-col justify-end">
                      <div className="absolute inset-0 z-0 flex flex-col justify-between py-2 sm:py-4 pointer-events-none">
                        {[100, 90, 80, 70, 60, 50, 40, 30, 20, 10].map((tick) => (
                          <div key={tick} className="flex items-center w-full">
                            <div className={`h-px bg-gray-400 ${tick % 50 === 0 ? 'w-4 sm:w-6' : 'w-2 sm:w-3'}`}></div>
                            {tick % 50 === 0 && <span className="text-[8px] sm:text-[10px] text-gray-500 ml-1">{tick}</span>}
                          </div>
                        ))}
                      </div>

                      {baseWaterVolume > 0 && (
                        <div 
                          className="bg-blue-400/60 w-full transition-all duration-700 ease-in-out relative z-0"
                          style={{ height: `${(currentWaterVolume / MAX_WATER) * 100}%` }}
                        >
                          <div className="absolute top-0 left-0 w-full h-1 bg-blue-300/80"></div>
                        </div>
                      )}
                      
                      <RenderObject id="A" currentZone="beaker" />
                      <RenderObject id="B" currentZone="beaker" />
                    </div>
                    <div className="mt-4 text-xs sm:text-sm text-gray-400 text-center">
                      拖曳至量杯中<br/>
                      (目前: <span className="font-bold text-blue-600">
                        {baseWaterVolume === 0 ? '---' : `${currentWaterVolume.toFixed(1)} mL`}
                      </span>)
                    </div>
                  </div>
                </div>

                {/* 桌面 */}
                <div 
                  className="mt-6 p-4 bg-yellow-900/10 rounded-xl border-2 border-dashed border-yellow-800/30 flex items-center justify-center gap-6 sm:gap-12 min-h-[100px] sm:min-h-[120px] relative"
                  onDragOver={handleDragOver}
                  onDrop={(e) => handleDrop(e, 'table')}
                >
                  <div className="absolute left-4 sm:left-10 text-yellow-800/50 font-bold text-xs sm:text-base">實驗桌面</div>
                  <RenderObject id="A" currentZone="table" />
                  <RenderObject id="B" currentZone="table" />
                </div>
              </div>

              {/* 右側：數據紀錄區 */}
              <div className="w-full lg:w-1/3 bg-white rounded-xl shadow-lg flex flex-col overflow-hidden">
                <div className="bg-blue-600 text-white p-3 sm:p-4">
                  <h2 className="text-lg sm:text-xl font-bold">📝 實驗數據紀錄表</h2>
                </div>
                
                <div className="p-4 sm:p-5 flex-grow flex flex-col overflow-y-auto">
                  <div className="bg-gray-50 p-3 sm:p-4 rounded-lg border border-gray-200 mb-4 sm:mb-6 space-y-2 sm:space-y-3">
                    <h3 className="font-bold text-sm sm:text-base text-gray-700 mb-2 border-b pb-2">手動輸入測量結果</h3>
                    
                    {/* 輸入表單欄位 */}
                    {[
                      { label: "待測物：", name: "objectName", type: "select", options: ["A", "B"] },
                      { label: "質量(g)：", name: "mass", type: "number" },
                      { label: "原水量(mL)：", name: "initialVolume", type: "number" },
                      { label: "後水量(mL)：", name: "finalVolume", type: "number" },
                      { label: "體積(cm³)：", name: "calcVolume", type: "number", bg: "bg-blue-50" },
                    ].map((field) => (
                      <div key={field.name} className="flex items-center gap-2">
                        <label className="w-20 sm:w-24 text-xs sm:text-sm font-medium text-gray-600">{field.label}</label>
                        {field.type === "select" ? (
                          <select name={field.name} value={formData[field.name]} onChange={handleInputChange} className="flex-1 p-1 sm:p-2 border rounded focus:ring-2 focus:ring-blue-400 outline-none text-sm">
                            <option value="A">沉體 A</option>
                            <option value="B">沉體 B</option>
                          </select>
                        ) : (
                          <input type="number" step="0.1" name={field.name} value={formData[field.name]} onChange={handleInputChange} className={`flex-1 p-1 sm:p-2 border rounded focus:ring-2 focus:ring-blue-400 outline-none font-mono text-sm ${field.bg || ''}`} />
                        )}
                      </div>
                    ))}

                    <div className="flex items-center gap-2 mt-2 pt-2 border-t">
                      <label className="w-20 sm:w-24 text-xs sm:text-sm font-bold text-gray-800">密度(g/cm³)</label>
                      <input type="number" step="0.01" name="density" value={formData.density} onChange={handleInputChange} className="flex-1 p-1 sm:p-2 border-2 border-blue-200 rounded focus:ring-2 focus:ring-blue-500 outline-none font-mono font-bold text-blue-700 bg-blue-50 text-sm" />
                    </div>

                    {errorMsg && <div className="text-red-500 text-xs sm:text-sm mt-2 font-bold text-center">{errorMsg}</div>}

                    <button onClick={handleRecord} className="w-full mt-3 sm:mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded shadow transition-colors text-sm sm:text-base">
                      📥 紀錄數據
                    </button>
                  </div>

                  <div className="flex-grow flex flex-col">
                    <div className="flex justify-between items-end mb-2">
                      <h3 className="font-bold text-sm sm:text-base text-gray-700">歷史紀錄</h3>
                      {showClearConfirm ? (
                        <div className="flex gap-1 sm:gap-2 items-center">
                          <span className="text-xs sm:text-sm text-red-600 font-bold">確定？</span>
                          <button onClick={handleClearRecords} className="text-[10px] sm:text-xs bg-red-500 text-white px-2 py-1 rounded hover:bg-red-600 shadow">確定</button>
                          <button onClick={() => setShowClearConfirm(false)} className="text-[10px] sm:text-xs bg-gray-300 text-gray-700 px-2 py-1 rounded hover:bg-gray-400 shadow">取消</button>
                        </div>
                      ) : (
                        <button onClick={() => setShowClearConfirm(true)} className="text-xs sm:text-sm text-red-500 hover:text-red-700 hover:underline px-2">
                          🗑️ 清除所有
                        </button>
                      )}
                    </div>
                    
                    <div className="flex-grow border rounded-lg overflow-hidden flex flex-col bg-white">
                      <div className="overflow-x-auto">
                        <table className="w-full text-left text-gray-600 whitespace-nowrap">
                          <thead className="text-[10px] sm:text-xs text-gray-700 uppercase bg-gray-100 sticky top-0">
                            <tr>
                              <th className="px-2 py-2">物體</th>
                              <th className="px-2 py-2">M(g)</th>
                              <th className="px-2 py-2">V1(mL)</th>
                              <th className="px-2 py-2">V2(mL)</th>
                              <th className="px-2 py-2">V(cm³)</th>
                              <th className="px-2 py-2">D(g/cm³)</th>
                            </tr>
                          </thead>
                          <tbody>
                            {records.length === 0 ? (
                              <tr><td colSpan="6" className="text-center py-6 text-gray-400 italic text-xs">尚無數據</td></tr>
                            ) : (
                              records.map((rec) => (
                                <tr key={rec.id} className="border-b hover:bg-gray-50 text-[10px] sm:text-xs">
                                  <td className="px-2 py-2 font-bold">{rec.objectName}</td>
                                  <td className="px-2 py-2 font-mono">{rec.mass || '-'}</td>
                                  <td className="px-2 py-2 font-mono text-blue-500">{rec.initialVolume || '-'}</td>
                                  <td className="px-2 py-2 font-mono text-blue-500">{rec.finalVolume || '-'}</td>
                                  <td className="px-2 py-2 font-mono">{rec.calcVolume || '-'}</td>
                                  <td className="px-2 py-2 font-mono font-bold text-blue-600">{rec.density || '-'}</td>
                                </tr>
                              ))
                            )}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
