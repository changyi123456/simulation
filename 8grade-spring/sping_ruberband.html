<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彈性力學綜合模擬實驗 (彈簧 vs 橡皮筋)</title>
    
    <!-- 1. 載入 React 與 ReactDOM (鎖定 18.2.0 版本) -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- 2. 載入 PropTypes -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>

    <!-- 3. 載入 Recharts -->
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    
    <!-- 4. 載入 Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 5. 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { overflow-x: hidden; background-color: #f8fafc; }
        .recharts-wrapper { font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 1. Interaction Logger (數據追蹤工具)
        // ==========================================
        const STORAGE_KEY = "TaskInteractionData";
        let interactionHistory = [];

        const InteractionLogger = {
            init: function(simName) {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try {
                        const parsed = JSON.parse(stored);
                        if (Array.isArray(parsed)) {
                            interactionHistory = parsed;
                        }
                    } catch (e) {
                        console.warn("Failed to parse existing interaction data", e);
                        interactionHistory = [];
                    }
                }
                this.log('Initialize', { timestamp: new Date().toISOString(), sim: simName });
            },

            log: function(action, details = {}) {
                const event = {
                    timestamp: new Date().toISOString(),
                    action: action,
                    details: details
                };
                interactionHistory.push(event);
                if (interactionHistory.length > 500) {
                    interactionHistory.shift();
                }
                localStorage.setItem(STORAGE_KEY, JSON.stringify(interactionHistory));
                // Console 顯示追蹤狀況 (可選)
                // console.log(`[Logged] ${action}:`, details);
            },

            clear: function() {
                interactionHistory = [];
                localStorage.setItem(STORAGE_KEY, JSON.stringify([]));
            }
        };

        // ==========================================
        // 2. React 應用程式共用組件與環境
        // ==========================================
        const { useState, useEffect, useMemo } = React;
        const RechartsObj = window.Recharts || {};
        const { ResponsiveContainer, ScatterChart, Scatter, XAxis, YAxis, CartesianGrid, Tooltip, ReferenceArea } = RechartsObj;

        if (!window.Recharts) { console.error("Recharts Load Failed"); }

        // --- Icons ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                alertCircle: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
                alertTriangle: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
                trash2: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
                plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
                download: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
                anchor: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="5" r="3"/><line x1="12" y1="22" x2="12" y2="8"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/></svg>,
                trendingUp: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>,
                calculator: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>,
                x: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
                minus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>,
                gitFork: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3"/><path d="M18 9v1a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V9"/><line x1="12" y1="12" x2="12" y2="15"/></svg>,
                beaker: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.5 3h15"/><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3"/><path d="M6 14h12"/></svg>
            };
            return <span className={className}>{icons[name] || null}</span>;
        };

        // ==========================================
        // 3. 第一部分：理想彈簧模擬器
        // ==========================================
        const SpringExperiment = () => {
            const L0 = 8.0; 
            const PAN_MASS = 100; 
            const MAX_TOTAL_MASS = 1000;
            const SPRING_K = 24.5; 

            const [mode, setMode] = useState('single'); 
            const [isPanAttached, setIsPanAttached] = useState(false);
            const [addedMass, setAddedMass] = useState(0);
            const [currentExtension, setCurrentExtension] = useState(0);
            const [history, setHistory] = useState([]);
            const [isMaxedOut, setIsMaxedOut] = useState(false);
            const [trendline, setTrendline] = useState(null);

            // 全域實驗次數追蹤
            const [totalRecordCount, setTotalRecordCount] = useState(0);
            const isExperimentLocked = totalRecordCount >= 10; // 達到 10 次就鎖定實驗

            const [dialog, setDialog] = useState({ isOpen: false, type: 'alert', title: '', message: '', onConfirm: null });

            const totalMass = isPanAttached ? (PAN_MASS + addedMass) : 0;
            const currentLength = L0 + currentExtension; 

            const currentModeCount = history.filter(d => d.mode === mode).length;
            const isModeLimitReached = currentModeCount >= 10;

            useEffect(() => {
                if (totalMass <= 0) {
                    setCurrentExtension(0);
                    setIsMaxedOut(false);
                    return;
                }

                const gravity = 9.8;
                const totalForce = (totalMass / 1000) * gravity;
                let resultExt = 0;
                const noise = (Math.random() - 0.5) * 0.05;

                if (mode === 'single') resultExt = (totalForce / SPRING_K) * 100;
                else if (mode === 'parallel') resultExt = (totalForce / (SPRING_K * 2)) * 100;

                const finalExt = Math.max(0, resultExt + noise);
                setIsMaxedOut(finalExt > 50); // 用於圖形繪製變紅
                setCurrentExtension(finalExt);
            }, [totalMass, mode]);

            const showAlert = (title, message) => setDialog({ isOpen: true, type: 'alert', title, message, onConfirm: null });
            const showConfirm = (title, message, onConfirm) => setDialog({ isOpen: true, type: 'confirm', title, message, onConfirm });
            const closeDialog = () => setDialog(prev => ({ ...prev, isOpen: false }));
            const handleConfirm = () => { if (dialog.onConfirm) dialog.onConfirm(); closeDialog(); };

            const calculateTrendline = () => {
                const activeData = history.filter(d => d.mode === mode);
                if (activeData.length < 2) {
                    showAlert("數據不足", `請在「${getModeLabel(mode)}」模式下至少記錄兩個數據點以進行分析。`);
                    return;
                }
                const n = activeData.length;
                let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
                
                activeData.forEach(pt => {
                    const x = pt.totalLength; 
                    const y = pt.mass;        
                    sumX += x;
                    sumY += y;
                    sumXY += x * y;
                    sumX2 += x * x;
                });
                
                const denominator = (n * sumX2 - sumX * sumX);
                if (Math.abs(denominator) < 0.0001) return;
                
                const slope = (n * sumXY - sumX * sumY) / denominator;
                const intercept = (sumY - slope * sumX) / n;
                
                const minLength = Math.min(...activeData.map(d => d.totalLength));
                const maxLength = Math.max(...activeData.map(d => d.totalLength));
                
                const x1 = Math.max(0, minLength * 0.9);
                const y1 = slope * x1 + intercept;
                const x2 = maxLength * 1.15;
                const y2 = slope * x2 + intercept;

                const trendPoints = [
                    { totalLength: Number(x1.toFixed(2)), mass: Number(y1.toFixed(2)) },
                    { totalLength: Number(x2.toFixed(2)), mass: Number(y2.toFixed(2)) }
                ];
                
                InteractionLogger.log('CalculateTrendline_Spring', { mode: mode, slope: slope.toFixed(2) });

                setTrendline({ slope: slope.toFixed(2), points: trendPoints, mode: mode });
            };

            const clearData = () => {
                showConfirm("清除確認", "確定要清除所有彈簧實驗數據嗎？\n(注意：全域的 10 次實驗上限不會因此歸零)", () => {
                    setHistory([]);
                    setTrendline(null);
                    InteractionLogger.log('ClearDataHistory_Spring');
                });
            };

            const addWeight = (amount) => {
                if (isExperimentLocked) return; 
                if (totalMass + amount > MAX_TOTAL_MASS) {
                    showAlert("超重警告", `為了器材安全，本實驗總承重限制為 ${MAX_TOTAL_MASS}g。`);
                    InteractionLogger.log('WeightLimitExceeded_Spring', { attemptedMass: totalMass + amount });
                    return;
                }
                setAddedMass(prev => prev + amount);
                InteractionLogger.log('AddWeight_Spring', { amount: amount, newTotalMass: totalMass + amount });
            };

            const recordData = () => {
                if (isExperimentLocked) return; 
                if (isModeLimitReached) {
                    showAlert("模式次數上限", `「${getModeLabel(mode)}」已達 10 次記錄上限，請切換模式或清除數據再試。`);
                    return;
                }
                
                const exists = history.some(d => d.mass === totalMass && d.mode === mode);
                if (!exists) {
                    const newExt = parseFloat(currentExtension.toFixed(2));
                    const newLength = parseFloat(currentLength.toFixed(2));
                    
                    setHistory(prev => [...prev, {
                        mode: mode,
                        mass: totalMass,
                        extension: newExt,
                        totalLength: newLength
                    }].sort((a, b) => a.mass - b.mass));
                    
                    setTotalRecordCount(prev => prev + 1); // 增加全域紀錄

                    InteractionLogger.log('RecordDataPoint_Spring', { mode: mode, mass: totalMass, totalLength: newLength });
                } else {
                    showAlert("重複記錄", "這個質量的數據已經記錄過囉！");
                }
            };

            const exportData = () => {
                InteractionLogger.log('ExportDataCSV_Spring');
                const csvContent = "data:text/csv;charset=utf-8,\uFEFF"
                    + "模式,總質量 m (g),彈簧全長 L (cm)\n"
                    + history.map(row => `${getModeLabel(row.mode)},${row.mass},${row.totalLength}`).join("\n");
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", "彈簧實驗數據.csv");
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const getModeLabel = (m) => {
                switch (m) { case 'single': return '單一彈簧'; case 'parallel': return '並聯模式'; default: return m; }
            };

            const getModeColor = (m) => {
                switch (m) { case 'single': return '#3b82f6'; case 'parallel': return '#10b981'; default: return '#64748b'; }
            };

            const SpringSVG = ({ width, height, coils = 12, color = "#64748b", strokeWidth = 2 }) => {
                const amp = width / 2 - 2; 
                const stepY = height / coils;
                let d = `M ${width/2} 0 L ${width/2} 10 `; 
                let currentY = 10;
                const coilHeight = (height - 20) / coils; 
                for(let i=0; i<coils; i++) {
                   d += `L ${width - 2} ${currentY + coilHeight/4} `;
                   d += `L ${2} ${currentY + 3*coilHeight/4} `;
                   currentY += coilHeight;
                }
                d += `L ${width/2} ${currentY} L ${width/2} ${height} `;
                return (
                    <svg width={width} height={height} style={{overflow: 'visible'}}>
                        <path d={d} fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" />
                    </svg>
                );
            };

            const PIXELS_PER_CM = 10; 
            
            const renderSprings = () => {
                const color = isMaxedOut ? "#ef4444" : "#475569";
                const strokeWidth = 2.5;
                const coilCount = 15;
                const springWidth = 30;
                const totalVisualHeight = currentLength * PIXELS_PER_CM;
                const singleSpringHeight = totalVisualHeight;

                if (mode === 'single') {
                    return (
                        <div className="flex justify-center transition-all duration-300 ease-out" style={{height: `${singleSpringHeight}px`}}>
                            <SpringSVG width={springWidth} height={singleSpringHeight} coils={coilCount} color={color} strokeWidth={strokeWidth} />
                        </div>
                    );
                } else if (mode === 'parallel') {
                    return (
                        <div className="flex justify-center gap-4 transition-all duration-300 ease-out" style={{height: `${singleSpringHeight}px`}}>
                             <SpringSVG width={springWidth} height={singleSpringHeight} coils={coilCount} color={color} strokeWidth={strokeWidth} />
                             <SpringSVG width={springWidth} height={singleSpringHeight} coils={coilCount} color={color} strokeWidth={strokeWidth} />
                        </div>
                    );
                }
            };

            const dataSingle = history.filter(d => d.mode === 'single');
            const dataParallel = history.filter(d => d.mode === 'parallel');

            return (
                <div className="font-sans text-slate-800 relative">
                    {/* 彈窗 */}
                    {dialog.isOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm">
                            <div className="bg-white rounded-xl shadow-xl max-w-sm w-full p-6 relative border border-slate-200">
                                <button onClick={closeDialog} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><Icon name="x" /></button>
                                <div className="flex flex-col items-center text-center">
                                    <div className={`p-3 rounded-full mb-4 ${dialog.type === 'confirm' ? 'bg-red-100 text-red-600' : 'bg-amber-100 text-amber-600'}`}>
                                        {dialog.type === 'confirm' ? <Icon name="alertTriangle" size={32} /> : <Icon name="alertCircle" size={32} />}
                                    </div>
                                    <h3 className="text-xl font-bold text-slate-900 mb-2">{dialog.title}</h3>
                                    <p className="text-slate-600 mb-6">{dialog.message}</p>
                                    <div className="flex gap-3 w-full">
                                        {dialog.type === 'confirm' ? (
                                            <>
                                                <button onClick={closeDialog} className="flex-1 px-4 py-2 border border-slate-300 rounded-lg text-slate-700 hover:bg-slate-50">取消</button>
                                                <button onClick={handleConfirm} className="flex-1 px-4 py-2 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700">確定</button>
                                            </>
                                        ) : (
                                            <button onClick={closeDialog} className="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700">知道了</button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
                        
                        {/* Header */}
                        <div className="lg:col-span-12 bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div>
                                <h1 className="text-2xl font-bold text-slate-900 flex items-center gap-2">
                                    ⚙️ 理想彈簧虎克定律模擬
                                    <span className="text-xs bg-indigo-50 text-indigo-600 px-2 py-1 rounded-full font-mono border border-indigo-100">Linear Model</span>
                                </h1>
                                <p className="text-slate-500 mt-1 text-sm">
                                    驗證虎克定律 (F=kx) 與彈簧並聯組合
                                </p>
                            </div>
                            
                            <div className="flex bg-slate-100 p-1 rounded-lg overflow-x-auto max-w-full">
                                {[
                                    { id: 'single', iconName: 'minus', label: '單一' },
                                    { id: 'parallel', iconName: 'gitFork', label: '並聯' }
                                ].map((m) => {
                                    const isActive = mode === m.id;
                                    const rotateClass = m.id === 'parallel' ? 'rotate-180' : 'rotate-90';
                                    return (
                                        <button
                                            key={m.id}
                                            onClick={() => { 
                                                setMode(m.id); 
                                                setTrendline(null); 
                                                setIsPanAttached(false);
                                                setAddedMass(0);
                                                InteractionLogger.log('ChangeMode_Spring', { mode: m.id });
                                            }}
                                            className={`flex items-center gap-2 px-4 py-2 rounded-md text-sm font-bold transition-all whitespace-nowrap ${
                                                isActive ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'
                                            }`}
                                        >
                                            <Icon name={m.iconName} size={16} className={rotateClass} />
                                            {m.label}
                                        </button>
                                    )
                                })}
                            </div>

                            <div className="flex gap-4 text-sm text-slate-600 bg-slate-50 px-4 py-2 rounded-lg border border-slate-100">
                                <div className="flex flex-col items-center">
                                    <span className="font-bold text-lg">{totalMass} g</span>
                                    <span className="text-xs text-slate-400">總掛重</span>
                                </div>
                                <div className="w-px bg-slate-200 mx-2"></div>
                                <div className="flex flex-col items-center">
                                    <span className={`font-bold text-lg ${isMaxedOut ? 'text-red-600' : 'text-blue-600'}`}>
                                        {currentLength.toFixed(1)} cm
                                    </span>
                                    <span className="text-xs text-slate-400">全長</span>
                                </div>
                            </div>
                        </div>

                        {/* 左側：實驗操作區 */}
                        <div className="lg:col-span-5 flex flex-col gap-4">
                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 h-[600px] relative overflow-hidden flex justify-center bg-grid-slate-100">
                                <div className="absolute inset-0 pointer-events-none opacity-50" 
                                    style={{backgroundImage: 'linear-gradient(#cbd5e1 1px, transparent 1px), linear-gradient(90deg, #cbd5e1 1px, transparent 1px)', backgroundSize: '20px 20px'}}></div>

                                <div className="absolute top-0 w-48 h-4 bg-slate-700 rounded-b-lg shadow-md z-10"></div>
                                
                                {/* 尺規 */}
                                <div className="absolute left-4 top-4 bottom-4 w-12 border-r-2 border-slate-400 flex flex-col items-end py-2 pr-1 text-xs text-slate-400 font-mono">
                                    {[...Array(20)].map((_, i) => (
                                        <div key={i} className="h-[30px] w-full border-b border-slate-200 flex items-end justify-end relative">
                                            <span className="absolute right-2 bottom-[-8px]">{i*3}</span>
                                            <div className="w-2 h-px bg-slate-400"></div>
                                        </div>
                                    ))}
                                    <div className="absolute top-0 right-8 rotate-90 origin-right whitespace-nowrap text-slate-400">cm</div>
                                </div>

                                <div className="relative top-4 flex flex-col items-center transition-all duration-300 ease-out" style={{ width: '140px' }}>
                                    {renderSprings()}
                                    <div className="w-full flex justify-center -mt-1">
                                        <div className="w-1 h-3 bg-gray-500 rounded-b-sm"></div>
                                    </div>
                                    {isPanAttached ? (
                                        <div className="w-32 h-2 bg-gray-600 rounded mb-1 shadow-lg relative flex justify-center items-end animate-in fade-in slide-in-from-top-4 duration-500">
                                            <div className="absolute bottom-2 flex flex-col-reverse items-center gap-px">
                                                <div className="w-20 h-4 bg-gray-500 rounded-sm border border-gray-600 flex items-center justify-center text-[10px] text-white opacity-80">秤盤 100g</div>
                                                {addedMass > 0 && (
                                                    <div className="w-16 h-auto max-h-[120px] bg-amber-600 rounded-sm border border-amber-700 flex items-center justify-center text-[10px] text-white shadow-sm px-2 py-1">
                                                        +{addedMass}g
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="text-xs text-slate-400 mt-2 font-mono bg-slate-100 px-2 py-1 rounded">
                                            秤盤已取下
                                        </div>
                                    )}
                                </div>

                                {isMaxedOut && (
                                    <div className="absolute top-20 right-10 bg-red-100 text-red-700 px-3 py-2 rounded-lg border border-red-200 shadow-sm flex items-center gap-2 animate-bounce">
                                        <Icon name="alertCircle" size={16} />
                                        <span className="text-xs font-bold">已達顯示極限</span>
                                    </div>
                                )}
                                
                                <div className="absolute bottom-4 right-4 text-4xl font-black text-slate-200 select-none pointer-events-none uppercase tracking-widest">
                                    {mode}
                                </div>
                            </div>

                            {/* 控制面板 */}
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 relative">
                                {isExperimentLocked && (
                                    <div className="absolute -top-3 right-6 bg-red-500 text-white text-xs px-3 py-1 rounded-full shadow-md font-bold animate-pulse">
                                        已達 10 次實驗次數上限，控制台鎖定
                                    </div>
                                )}
                                <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2">
                                    <Icon name="plus" size={18} className="text-blue-500"/> 控制台
                                    <span className={`ml-auto text-xs font-bold ${isExperimentLocked ? 'text-red-500' : 'text-slate-500'}`}>
                                        已記錄: {totalRecordCount}/10 次
                                    </span>
                                </h3>
                                
                                <div className="flex gap-2 mb-4">
                                    <button 
                                        onClick={() => {
                                            const newState = !isPanAttached;
                                            setIsPanAttached(newState);
                                            InteractionLogger.log('TogglePan_Spring', { isAttached: newState });
                                        }}
                                        disabled={isExperimentLocked}
                                        className={`flex-1 py-3 px-4 rounded-lg font-bold transition-all flex items-center justify-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed ${isPanAttached ? 'bg-amber-100 text-amber-800 hover:bg-amber-200' : 'bg-emerald-100 text-emerald-800 hover:bg-emerald-200'}`}
                                    >
                                        <Icon name="anchor" size={18} />
                                        {isPanAttached ? '取下秤盤' : '掛上秤盤 (100g)'}
                                    </button>
                                </div>

                                <div className="grid grid-cols-4 gap-2 mb-4">
                                    {[1, 5, 10, 50].map((w) => (
                                        <button
                                            key={w}
                                            onClick={() => addWeight(w)}
                                            disabled={!isPanAttached || totalMass + w > MAX_TOTAL_MASS || isExperimentLocked}
                                            className="bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 py-3 rounded-lg font-bold transition-colors disabled:opacity-40 disabled:cursor-not-allowed flex flex-col items-center justify-center"
                                        >
                                            <span className="text-lg">+{w}</span>
                                            <span className="text-xs font-normal">克</span>
                                        </button>
                                    ))}
                                </div>

                                <div className="flex gap-2">
                                    <button 
                                        onClick={() => {
                                            setAddedMass(0);
                                            InteractionLogger.log('ClearWeight_Spring');
                                        }}
                                        disabled={(!isPanAttached || addedMass === 0) || isExperimentLocked}
                                        className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 py-2 rounded-lg text-sm font-medium transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
                                    >
                                        清空砝碼
                                    </button>
                                    <button 
                                        onClick={recordData}
                                        disabled={isExperimentLocked || isModeLimitReached}
                                        className={`flex-[2] py-2 rounded-lg text-sm font-bold shadow-sm transition-all disabled:opacity-50 disabled:cursor-not-allowed disabled:scale-100 ${(isExperimentLocked || isModeLimitReached) ? 'bg-slate-400 text-white' : 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-indigo-200 active:scale-95'}`}
                                    >
                                        {isExperimentLocked ? '已達 10 次上限' : (isModeLimitReached ? '模式已達10次上限' : '記錄目前數據點')}
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* 右側：數據分析區 */}
                        <div className="lg:col-span-7 flex flex-col gap-6">
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex-1 min-h-[400px]">
                                <div className="flex justify-between items-center mb-4 flex-wrap gap-2">
                                    <h3 className="font-bold text-slate-800">📊 實驗數據比較圖 (質量 vs 全長)</h3>
                                    <div className="flex gap-2 text-xs">
                                        <div className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-blue-500"></div>單一</div>
                                        <div className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-emerald-500"></div>並聯</div>
                                    </div>
                                </div>
                                
                                <div className="h-[350px] w-full relative">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <ScatterChart margin={{ top: 20, right: 20, bottom: 20, left: 20 }}>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
                                            <XAxis 
                                                type="number" 
                                                dataKey="totalLength" 
                                                name="全長" 
                                                unit="cm" 
                                                domain={[0, 'auto']} 
                                                label={{ value: '彈簧全長 L (cm)', position: 'insideBottomRight', offset: -10 }}
                                            />
                                            <YAxis 
                                                type="number" 
                                                dataKey="mass" 
                                                name="重量" 
                                                unit="g" 
                                                domain={[0, 1000]} 
                                                ticks={[0, 200, 400, 600, 800, 1000]}
                                                label={{ value: '總質量 m (g)', angle: -90, position: 'insideLeft' }}
                                            />
                                            <Tooltip cursor={{ strokeDasharray: '3 3' }} />
                                            
                                            <Scatter name="單一彈簧" data={dataSingle} fill={getModeColor('single')} shape="circle" />
                                            <Scatter name="並聯模式" data={dataParallel} fill={getModeColor('parallel')} shape="square" />

                                            {trendline && (
                                                <Scatter 
                                                    name="趨勢線" 
                                                    data={trendline.points} 
                                                    line={{ stroke: '#ef4444', strokeWidth: 2, strokeDasharray: '5 5' }} 
                                                    shape={() => null} 
                                                />
                                            )}
                                        </ScatterChart>
                                    </ResponsiveContainer>
                                    
                                    {trendline && (
                                        <div className="absolute top-2 left-16 bg-white/95 backdrop-blur border p-3 rounded-lg shadow-sm text-sm z-10" style={{ borderColor: getModeColor(trendline.mode) }}>
                                            <div className="font-bold mb-1 flex items-center gap-1" style={{ color: getModeColor(trendline.mode) }}>
                                                <Icon name="trendingUp" size={14}/> {getModeLabel(trendline.mode)} 趨勢分析
                                            </div>
                                            <div className="font-bold text-slate-800">線性斜率: {trendline.slope} g/cm</div>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* 數據表格 */}
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex-1">
                                <div className="flex justify-between items-center mb-4 flex-wrap gap-2">
                                    <h3 className="font-bold text-slate-800">📝 數據記錄表</h3>
                                    <div className="flex gap-2">
                                        <button 
                                            onClick={calculateTrendline}
                                            disabled={history.filter(d => d.mode === mode).length < 2}
                                            className="px-3 py-2 text-indigo-600 bg-indigo-50 hover:bg-indigo-100 rounded-lg text-sm font-bold flex items-center gap-2 transition-colors disabled:opacity-30 disabled:cursor-not-allowed"
                                            title={`分析「${getModeLabel(mode)}」的趨勢線`}
                                        >
                                            <Icon name="calculator" size={16} />
                                            分析目前模式
                                        </button>
                                        <div className="w-px bg-slate-200 mx-1"></div>
                                        <button onClick={exportData} disabled={history.length === 0} className="p-2 text-slate-600 hover:text-blue-600 hover:bg-blue-50 rounded disabled:opacity-30">
                                            <Icon name="download" size={18} />
                                        </button>
                                        <button onClick={clearData} disabled={history.length === 0} className="p-2 text-slate-600 hover:text-red-600 hover:bg-red-50 rounded disabled:opacity-30">
                                            <Icon name="trash2" size={18} />
                                        </button>
                                    </div>
                                </div>

                                <div className="overflow-x-auto max-h-[250px] overflow-y-auto border rounded-lg">
                                    <table className="w-full text-sm text-left text-slate-600">
                                        <thead className="text-xs text-slate-700 uppercase bg-slate-50 sticky top-0">
                                            <tr>
                                                <th className="px-4 py-3">模式</th>
                                                <th className="px-4 py-3">總質量 m (g)</th>
                                                <th className="px-4 py-3">彈簧全長 L (cm)</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {history.length === 0 ? (
                                                <tr>
                                                    <td colSpan="3" className="px-6 py-8 text-center text-slate-400 italic">
                                                        尚未記錄數據，請掛上砝碼或直接記錄原長...
                                                    </td>
                                                </tr>
                                            ) : (
                                                history.map((row, index) => {
                                                    return (
                                                        <tr key={index} className="bg-white border-b hover:bg-slate-50">
                                                            <td className="px-4 py-3">
                                                                <span className="px-2 py-1 rounded text-xs font-bold text-white" style={{ backgroundColor: getModeColor(row.mode) }}>
                                                                    {getModeLabel(row.mode)}
                                                                </span>
                                                            </td>
                                                            <td className="px-4 py-3 font-medium text-slate-900">{row.mass}</td>
                                                            <td className="px-4 py-3">{row.totalLength}</td>
                                                        </tr>
                                                    );
                                                })
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 4. 第二部分：橡皮筋模擬器
        // ==========================================
        const RubberBandExperiment = () => {
            const L0 = 6.0; 
            const PAN_MASS = 100;
            const MAX_TOTAL_MASS = 1000;

            const [isPanAttached, setIsPanAttached] = useState(false); 
            const [addedMass, setAddedMass] = useState(0);
            const [currentExtension, setCurrentExtension] = useState(0);
            const [history, setHistory] = useState([]);
            
            const [totalRecordCount, setTotalRecordCount] = useState(0);
            const isExperimentLocked = totalRecordCount >= 30; 

            const [isLimitReached, setIsLimitReached] = useState(false);
            const [trendline, setTrendline] = useState(null);
            const [dialog, setDialog] = useState({ isOpen: false, type: 'alert', title: '', message: '', onConfirm: null });

            const totalMass = isPanAttached ? (PAN_MASS + addedMass) : 0;
            const currentLength = L0 + currentExtension; 

            // 橡皮筋理論公式二元搜尋反算器
            const calculateExtensionFromMass = (targetMass) => {
                if (targetMass <= 0) return 0;
                
                const K1 = 40;   
                const K2 = 200;  
                const Jm = 40;   
                
                let minExt = 0;
                let maxExt = 35; 
                let midExt = 0;

                for (let i = 0; i < 50; i++) {
                    midExt = (minExt + maxExt) / 2;
                    
                    const lambda = (L0 + midExt) / L0;
                    const J1 = (lambda * lambda) + (2 / lambda) - 3;
                    
                    let m_calc = 0;
                    if (J1 >= Jm) {
                        m_calc = Infinity;
                    } else {
                        const mooneyRivlin = (K1 + K2 / lambda) * (lambda - (1 / (lambda * lambda)));
                        const gentFactor = Jm / (Jm - J1);
                        m_calc = mooneyRivlin * gentFactor;
                    }
                    
                    if (m_calc < targetMass) minExt = midExt;
                    else maxExt = midExt;
                }
                
                return midExt;
            };

            useEffect(() => {
                if (totalMass <= 0) {
                    setCurrentExtension(0);
                    setIsLimitReached(false);
                    return;
                }
                
                const noise = (Math.random() - 0.5) * 0.1;
                const ext = calculateExtensionFromMass(totalMass);
                
                setCurrentExtension(Math.max(0, ext + noise));
                setIsLimitReached(ext > 24);
            }, [totalMass]);

            const showAlert = (title, message) => setDialog({ isOpen: true, type: 'alert', title, message, onConfirm: null });
            const showConfirm = (title, message, onConfirm) => setDialog({ isOpen: true, type: 'confirm', title, message, onConfirm });
            const closeDialog = () => setDialog(prev => ({ ...prev, isOpen: false }));
            const handleConfirm = () => { if (dialog.onConfirm) dialog.onConfirm(); closeDialog(); };

            const calculateTrendline = () => {
                if (history.length < 2) {
                    showAlert("數據不足", `請至少記錄兩個數據點以進行分析。`);
                    return;
                }
                const n = history.length;
                let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
                history.forEach(pt => {
                    const x = pt.totalLength; 
                    const y = pt.mass;        
                    sumX += x;
                    sumY += y;
                    sumXY += x * y;
                    sumX2 += x * x;
                });
                
                const denominator = (n * sumX2 - sumX * sumX);
                if (Math.abs(denominator) < 0.0001) return;
                
                const slope = (n * sumXY - sumX * sumY) / denominator;
                const intercept = (sumY - slope * sumX) / n;
                
                const minLength = Math.min(...history.map(d => d.totalLength));
                const maxLength = Math.max(...history.map(d => d.totalLength));

                const x1 = Math.max(0, minLength * 0.9);
                const y1 = slope * x1 + intercept;
                const x2 = maxLength * 1.15;
                const y2 = slope * x2 + intercept;

                const trendPoints = [
                    { totalLength: Number(x1.toFixed(2)), mass: Number(y1.toFixed(2)) },
                    { totalLength: Number(x2.toFixed(2)), mass: Number(y2.toFixed(2)) }
                ];
                
                InteractionLogger.log('CalculateTrendline_Rubber', { slope: slope.toFixed(2) });

                setTrendline({
                    slope: slope.toFixed(2),
                    points: trendPoints
                });
            };

            const clearData = () => showConfirm("清除確認", "確定要清除目前的數據圖表嗎？\n(注意：全域的 30 次實驗上限不會因此歸零)", () => { 
                setHistory([]); 
                setTrendline(null); 
                InteractionLogger.log('ClearDataHistory_Rubber'); 
            });
            
            const addWeight = (amount) => {
                if (isExperimentLocked) return;
                if (totalMass + amount > MAX_TOTAL_MASS) { 
                    showAlert("超重警告", `為了器材安全，本實驗總承重限制為 ${MAX_TOTAL_MASS}g。`); 
                    InteractionLogger.log('WeightLimitExceeded_Rubber', { attemptedMass: totalMass + amount });
                    return; 
                }
                setAddedMass(prev => prev + amount);
                InteractionLogger.log('AddWeight_Rubber', { amount: amount, newTotalMass: totalMass + amount });
            };
            
            const recordData = () => {
                if (isExperimentLocked) return; 

                const exists = history.some(d => d.mass === totalMass);
                if (!exists) {
                    const newLength = parseFloat(currentLength.toFixed(2));
                    setHistory(prev => [...prev, {
                        mass: totalMass,
                        totalLength: newLength
                    }].sort((a, b) => a.mass - b.mass));
                    
                    setTotalRecordCount(prev => prev + 1); 

                    InteractionLogger.log('RecordDataPoint_Rubber', { 
                        mass: totalMass, 
                        totalLength: newLength 
                    });
                } else {
                    showAlert("重複記錄", "這個質量的數據已經記錄過囉！");
                }
            };
            
            const exportData = () => {
                InteractionLogger.log('ExportDataCSV_Rubber');
                const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + "質量 m (g),橡皮筋全長 L (cm)\n" + 
                history.map(row => {
                    return `${row.mass},${row.totalLength}`;
                }).join("\n");
                
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", "橡皮筋非線性數據.csv");
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const PIXELS_PER_CM = 12; 
            const RUBBER_WIDTH_BASE = 8;
            const currentWidth = Math.max(2, RUBBER_WIDTH_BASE * (L0 / currentLength));
            
            const getRubberColor = () => {
                if (currentExtension > 24) return "#ef4444"; 
                if (currentExtension > 16) return "#eab308"; 
                return "#22c55e"; 
            };

            const renderRubberBands = () => {
                const color = getRubberColor();
                const totalVisualHeight = currentLength * PIXELS_PER_CM;
                const styleBand = { 
                    backgroundColor: color, 
                    boxShadow: isLimitReached ? '0 0 10px rgba(239, 68, 68, 0.5)' : 'none', 
                    border: '1px solid rgba(0,0,0,0.1)', 
                    transition: 'all 0.5s ease-out' 
                };

                return <div style={{ ...styleBand, width: `${currentWidth}px`, height: `${totalVisualHeight}px` }} className="rounded-full" />;
            };

            return (
                <div className="font-sans text-slate-800 relative">
                    {dialog.isOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm">
                            <div className="bg-white rounded-xl shadow-xl max-w-sm w-full p-6 relative border border-slate-200">
                                <button onClick={closeDialog} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><Icon name="x" /></button>
                                <div className="flex flex-col items-center text-center">
                                    <div className={`p-3 rounded-full mb-4 ${dialog.type === 'confirm' ? 'bg-red-100 text-red-600' : 'bg-amber-100 text-amber-600'}`}>
                                        {dialog.type === 'confirm' ? <Icon name="alertTriangle" size={32} /> : <Icon name="alertCircle" size={32} />}
                                    </div>
                                    <h3 className="text-xl font-bold text-slate-900 mb-2">{dialog.title}</h3>
                                    <p className="text-slate-600 mb-6">{dialog.message}</p>
                                    <div className="flex gap-3 w-full">
                                        {dialog.type === 'confirm' ? (
                                            <>
                                                <button onClick={closeDialog} className="flex-1 px-4 py-2 border border-slate-300 rounded-lg text-slate-700 hover:bg-slate-50">取消</button>
                                                <button onClick={handleConfirm} className="flex-1 px-4 py-2 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700">確定</button>
                                            </>
                                        ) : (
                                            <button onClick={closeDialog} className="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700">知道了</button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
                        <div className="lg:col-span-12 bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div>
                                <h1 className="text-2xl font-bold text-slate-900 flex items-center gap-2">
                                    🧪 橡皮筋彈力模擬實驗
                                    <span className="text-xs bg-slate-100 text-slate-600 px-2 py-1 rounded-full font-mono">Non-Linear Model</span>
                                </h1>
                                <p className="text-slate-500 mt-1 text-sm">探究高分子彈性體的非線性拉伸特性（S-Curve）</p>
                            </div>
                            
                            <div className="flex gap-4 text-sm text-slate-600 bg-slate-50 px-4 py-2 rounded-lg border border-slate-100">
                                <div className="flex flex-col items-center"><span className="font-bold text-lg">{totalMass} g</span><span className="text-xs text-slate-400">總質量</span></div>
                                <div className="w-px bg-slate-200 mx-2"></div>
                                <div className="flex flex-col items-center"><span className={`font-bold text-lg ${isLimitReached ? 'text-red-600 animate-pulse' : 'text-blue-600'}`}>{currentLength.toFixed(1)} cm</span><span className="text-xs text-slate-400">全長</span></div>
                            </div>
                        </div>
                        <div className="lg:col-span-5 flex flex-col gap-4">
                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 h-[600px] relative overflow-hidden flex justify-center bg-grid-slate-100">
                                <div className="absolute inset-0 pointer-events-none opacity-50" style={{ backgroundImage: 'linear-gradient(#cbd5e1 1px, transparent 1px), linear-gradient(90deg, #cbd5e1 1px, transparent 1px)', backgroundSize: '20px 20px' }}></div>
                                <div className="absolute top-0 w-48 h-4 bg-slate-700 rounded-b-lg shadow-md z-10"></div>
                                <div className="absolute left-4 top-4 bottom-4 w-12 border-r-2 border-slate-400 flex flex-col items-end py-2 pr-1 text-xs text-slate-400 font-mono">
                                    {[...Array(20)].map((_, i) => <div key={i} className="h-[24px] w-full border-b border-slate-200 flex items-end justify-end relative"><span className="absolute right-2 bottom-[-8px]">{i * 2}</span><div className="w-2 h-px bg-slate-400"></div></div>)}
                                    <div className="absolute top-0 right-8 rotate-90 origin-right whitespace-nowrap text-slate-400">cm</div>
                                </div>
                                <div className="relative top-4 flex flex-col items-center transition-all duration-300 ease-out" style={{ width: '140px' }}>
                                    {renderRubberBands()}
                                    <div className="w-full flex justify-center"><div className="w-1 h-4 bg-gray-400 rounded-b-sm"></div></div>
                                    {isPanAttached ? <div className="w-32 h-2 bg-gray-600 rounded mb-1 shadow-lg relative flex justify-center items-end animate-in fade-in slide-in-from-top-4 duration-500"><div className="absolute bottom-2 flex flex-col-reverse items-center gap-px"><div className="w-20 h-4 bg-gray-500 rounded-sm border border-gray-600 flex items-center justify-center text-[10px] text-white opacity-80">秤盤 100g</div>{addedMass > 0 && <div className="w-16 h-auto max-h-[120px] bg-amber-600 rounded-sm border border-amber-700 flex items-center justify-center text-[10px] text-white shadow-sm px-2 py-1">+{addedMass}g</div>}</div></div> : <div className="text-xs text-slate-400 mt-2 font-mono bg-slate-100 px-2 py-1 rounded">秤盤已取下</div>}
                                </div>
                                {isLimitReached && <div className="absolute top-20 right-10 bg-red-100 text-red-700 px-3 py-2 rounded-lg border border-red-200 shadow-sm flex items-center gap-2 animate-bounce"><Icon name="alertCircle" size={16} /><span className="text-xs font-bold">接近材料極限！</span></div>}
                            </div>

                            {/* 控制面板 */}
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 relative">
                                {isExperimentLocked && (
                                    <div className="absolute -top-3 right-6 bg-red-500 text-white text-xs px-3 py-1 rounded-full shadow-md font-bold animate-pulse">
                                        已達 30 次實驗次數上限，控制台鎖定
                                    </div>
                                )}
                                <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2">
                                    <Icon name="plus" size={18} className="text-blue-500" /> 控制台
                                    <span className={`ml-auto text-xs font-bold ${isExperimentLocked ? 'text-red-500' : 'text-slate-500'}`}>
                                        已記錄: {totalRecordCount}/30 次
                                    </span>
                                </h3>
                                <div className="flex gap-2 mb-4">
                                    <button 
                                        onClick={() => { const newState = !isPanAttached; setIsPanAttached(newState); InteractionLogger.log('TogglePan_Rubber', { isAttached: newState }); }} 
                                        disabled={isExperimentLocked}
                                        className={`flex-1 py-3 px-4 rounded-lg font-bold transition-all flex items-center justify-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed ${isPanAttached ? 'bg-amber-100 text-amber-800 hover:bg-amber-200' : 'bg-emerald-100 text-emerald-800 hover:bg-emerald-200'}`}
                                    >
                                        <Icon name="anchor" size={18} />{isPanAttached ? '取下秤盤' : '掛上秤盤 (100g)'}
                                    </button>
                                </div>
                                <div className="grid grid-cols-4 gap-2 mb-4">
                                    {[1, 5, 10, 50].map((w) => 
                                        <button 
                                            key={w} 
                                            onClick={() => addWeight(w)} 
                                            disabled={!isPanAttached || totalMass + w > MAX_TOTAL_MASS || isExperimentLocked} 
                                            className="bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 py-3 rounded-lg font-bold transition-colors disabled:opacity-40 disabled:cursor-not-allowed flex flex-col items-center justify-center"
                                        >
                                            <span className="text-lg">+{w}</span><span className="text-xs font-normal">克</span>
                                        </button>
                                    )}
                                </div>
                                <div className="flex gap-2">
                                    <button 
                                        onClick={() => { setAddedMass(0); InteractionLogger.log('ClearWeight_Rubber'); }} 
                                        disabled={!isPanAttached || addedMass === 0 || isExperimentLocked} 
                                        className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 py-2 rounded-lg text-sm font-medium transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
                                    >
                                        清空砝碼
                                    </button>
                                    <button 
                                        onClick={recordData} 
                                        disabled={isExperimentLocked}
                                        className={`flex-[2] py-2 rounded-lg text-sm font-bold shadow-sm transition-all disabled:scale-100 disabled:cursor-not-allowed ${isExperimentLocked ? 'bg-slate-300 text-slate-500 shadow-none' : 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-indigo-200 active:scale-95'}`}
                                    >
                                        {isExperimentLocked ? '已達 30 次上限' : '記錄目前數據點'}
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-7 flex flex-col gap-6">
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex-1 min-h-[400px]">
                                <div className="flex justify-between items-center mb-4 flex-wrap gap-2">
                                    <h3 className="font-bold text-slate-800">📊 實驗數據圖 (質量 vs 全長)</h3>
                                </div>
                                <div className="h-[350px] w-full relative">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <ScatterChart margin={{ top: 20, right: 20, bottom: 20, left: 20 }}>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
                                            <XAxis type="number" dataKey="totalLength" name="全長" unit="cm" domain={[0, 30]} label={{ value: '橡皮筋全長 L (cm)', position: 'insideBottomRight', offset: -10 }} />
                                            <YAxis type="number" dataKey="mass" name="重量" unit="g" domain={[0, 1000]} ticks={[0, 100, 200, 300, 400, 500, 600, 700, 800, 900, 1000]} label={{ value: '總質量 m (g)', angle: -90, position: 'insideLeft' }} />
                                            <Tooltip cursor={{ strokeDasharray: '3 3' }} />
                                            
                                            <Scatter 
                                                name="橡皮筋拉伸" 
                                                data={history} 
                                                shape={(props) => <circle cx={props.cx} cy={props.cy} r={3} fill="#4f46e5" />} 
                                            />
                                            
                                            {trendline && <Scatter name="趨勢線" data={trendline.points} line={{ stroke: '#ef4444', strokeWidth: 2, strokeDasharray: '5 5' }} shape={() => null} dataKey="mass" />}
                                        </ScatterChart>
                                    </ResponsiveContainer>
                                    
                                    {trendline && (
                                        <div className="absolute top-2 left-16 bg-white/95 backdrop-blur border p-3 rounded-lg shadow-sm text-sm z-10 border-indigo-500">
                                            <div className="font-bold mb-1 flex items-center gap-1 text-indigo-600"><Icon name="trendingUp" size={14} /> 趨勢分析</div>
                                            <div className="font-bold text-slate-800">整體線性斜率: {trendline.slope} g/cm</div>
                                            <div className="text-[10px] text-slate-500 mt-1 max-w-[150px]">註：橡皮筋在低質量與高質量區段<br/>具有強烈非線性，不貼合直線是正常的！</div>
                                        </div>
                                    )}
                                </div>
                            </div>
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex-1">
                                <div className="flex justify-between items-center mb-4 flex-wrap gap-2">
                                    <h3 className="font-bold text-slate-800">📝 數據記錄表</h3>
                                    <div className="flex gap-2">
                                        <button onClick={calculateTrendline} disabled={history.length < 2} className="px-3 py-2 text-indigo-600 bg-indigo-50 hover:bg-indigo-100 rounded-lg text-sm font-bold flex items-center gap-2 transition-colors disabled:opacity-30 disabled:cursor-not-allowed" title="分析趨勢線"><Icon name="calculator" size={16} /> 分析整體趨勢線</button>
                                        <div className="w-px bg-slate-200 mx-1"></div>
                                        <button onClick={exportData} disabled={history.length === 0} className="p-2 text-slate-600 hover:text-blue-600 hover:bg-blue-50 rounded disabled:opacity-30"><Icon name="download" size={18} /></button>
                                        <button onClick={clearData} disabled={history.length === 0} className="p-2 text-slate-600 hover:text-red-600 hover:bg-red-50 rounded disabled:opacity-30"><Icon name="trash2" size={18} /></button>
                                    </div>
                                </div>
                                <div className="overflow-x-auto max-h-[250px] overflow-y-auto border rounded-lg">
                                    <table className="w-full text-sm text-left text-slate-600">
                                        <thead className="text-xs text-slate-700 uppercase bg-slate-50 sticky top-0">
                                            <tr>
                                                <th className="px-4 py-3">質量 m (g)</th>
                                                <th className="px-4 py-3">橡皮筋全長 L (cm)</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {history.length === 0 ? <tr><td colSpan="2" className="px-6 py-8 text-center text-slate-400 italic">尚未記錄數據，可直接記錄原長或掛上砝碼...</td></tr> : history.map((row, index) => { 
                                                return <tr key={index} className="bg-white border-b hover:bg-slate-50">
                                                    <td className="px-4 py-3 font-medium text-slate-900">{row.mass}</td>
                                                    <td className="px-4 py-3">{row.totalLength}</td>
                                                </tr> 
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 5. 綜合主程式 (管理分頁切換)
        // ==========================================
        const App = () => {
            const [activeTab, setActiveTab] = useState('spring');

            useEffect(() => {
                InteractionLogger.init('Combined_Elasticity_Simulation');
            }, []);

            const handleTabSwitch = (tab) => {
                setActiveTab(tab);
                InteractionLogger.log('SwitchTab', { targetTab: tab });
            };

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-800">
                    {/* 頂部導覽列 */}
                    <div className="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-40">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row md:items-center">
                            <div className="text-lg font-black text-indigo-700 py-3 px-4 md:pr-8 md:border-r border-slate-100 flex items-center gap-2">
                                <Icon name="beaker" size={24} /> 彈性力學綜合模擬
                            </div>
                            <div className="flex overflow-x-auto w-full md:w-auto">
                                <button
                                    onClick={() => handleTabSwitch('spring')}
                                    className={`flex-1 md:flex-none px-6 py-4 font-bold border-b-4 transition-colors whitespace-nowrap ${
                                        activeTab === 'spring' 
                                        ? 'border-blue-500 text-blue-600 bg-blue-50/50' 
                                        : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-50'
                                    }`}
                                >
                                    第一部分：理想彈簧 (Hooke's Law)
                                </button>
                                <button
                                    onClick={() => handleTabSwitch('rubber')}
                                    className={`flex-1 md:flex-none px-6 py-4 font-bold border-b-4 transition-colors whitespace-nowrap ${
                                        activeTab === 'rubber' 
                                        ? 'border-emerald-500 text-emerald-600 bg-emerald-50/50' 
                                        : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-50'
                                    }`}
                                >
                                    第二部分：橡皮筋 (Non-Linear)
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* 內容區塊 */}
                    <div className="p-4 md:p-6 animate-in fade-in duration-500">
                        {activeTab === 'spring' && <SpringExperiment />}
                        {activeTab === 'rubber' && <RubberBandExperiment />}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
