<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>橡皮筋虎克定律模擬實驗</title>
    
    <!-- 1. 載入 React 與 ReactDOM (鎖定 18.2.0 版本) -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- 2. 載入 PropTypes -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>

    <!-- 3. 載入 Recharts -->
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    
    <!-- 4. 載入 Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 5. 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { overflow-x: hidden; }
        .recharts-wrapper { font-family: sans-serif; }
    </style>
</head>
<body class="bg-slate-50">

    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 1. Interaction Logger (數據追蹤工具)
        // ==========================================
        const STORAGE_KEY = "TaskInteractionData";
        let interactionHistory = [];

        const InteractionLogger = {
            init: function() {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try {
                        const parsed = JSON.parse(stored);
                        if (Array.isArray(parsed)) {
                            interactionHistory = parsed;
                        }
                    } catch (e) {
                        console.warn("Failed to parse existing interaction data", e);
                        interactionHistory = [];
                    }
                }
                // 更新識別碼為 RubberBand_Simulation 以符合橡皮筋實驗
                this.log('Initialize', { timestamp: new Date().toISOString(), sim: "RubberBand_Simulation" });
            },

            log: function(action, details = {}) {
                const event = {
                    timestamp: new Date().toISOString(),
                    action: action,
                    details: details
                };
                interactionHistory.push(event);
                if (interactionHistory.length > 500) {
                    interactionHistory.shift();
                }
                localStorage.setItem(STORAGE_KEY, JSON.stringify(interactionHistory));
            },

            clear: function() {
                interactionHistory = [];
                localStorage.setItem(STORAGE_KEY, JSON.stringify([]));
            }
        };

        // ==========================================
        // 2. React 應用程式
        // ==========================================
        const { useState, useEffect, useMemo } = React;
        const RechartsObj = window.Recharts || {};
        const { ResponsiveContainer, ScatterChart, Scatter, XAxis, YAxis, CartesianGrid, Tooltip, Legend } = RechartsObj;

        if (!window.Recharts) { console.error("Recharts Load Failed"); }

        // --- Icons ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                alertCircle: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
                alertTriangle: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
                trash2: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
                plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
                download: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
                anchor: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="5" r="3"/><line x1="12" y1="22" x2="12" y2="8"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/></svg>,
                trendingUp: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>,
                calculator: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>,
                x: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
                minus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>,
                gitCommit: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="4" x2="12" y2="8"/><line x1="12" y1="16" x2="12" y2="20"/></svg>,
                gitFork: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3"/><path d="M18 9v1a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V9"/><line x1="12" y1="12" x2="12" y2="15"/></svg>
            };
            return <span className={className}>{icons[name] || null}</span>;
        };

        const App = () => {
            const L0 = 6.0; 
            const PAN_MASS = 100;
            const MAX_TOTAL_MASS = 1000;
            const MU = 0.35;
            const J_LIM = 80;

            const [mode, setMode] = useState('single');
            const [isPanAttached, setIsPanAttached] = useState(true);
            const [addedMass, setAddedMass] = useState(0);
            const [currentExtension, setCurrentExtension] = useState(0);
            const [history, setHistory] = useState([]);
            const [isLimitReached, setIsLimitReached] = useState(false);
            const [trendline, setTrendline] = useState(null);
            const [dialog, setDialog] = useState({ isOpen: false, type: 'alert', title: '', message: '', onConfirm: null });

            const totalMass = isPanAttached ? (PAN_MASS + addedMass) : 0;

            const calculateSingleBandExtension = (forceInNewtons) => {
                if (forceInNewtons <= 0) return { ext: 0, limit: false, lambda: 1 };
                const getForceFromLambda = (lam) => {
                    const J1 = Math.pow(lam, 2) + 2 / lam - 3;
                    const denominator = 1 - (J1 / J_LIM);
                    if (denominator <= 0.001) return 100000;
                    const term1 = MU * (lam - 1 / Math.pow(lam, 2));
                    return term1 / denominator;
                };
                let min = 1.0, max = 10.0, mid = 1.0;
                for (let i = 0; i < 50; i++) {
                    mid = (min + max) / 2;
                    const f_calc = getForceFromLambda(mid);
                    if (f_calc < forceInNewtons) min = mid;
                    else max = mid;
                }
                const lambda = mid;
                const extension = (lambda * L0) - L0;
                const J1 = Math.pow(lambda, 2) + 2 / lambda - 3;
                const limitReached = J1 / J_LIM > 0.85;
                return { ext: extension, limit: limitReached, lambda };
            };

            useEffect(() => {
                if (totalMass <= 0) {
                    setCurrentExtension(0);
                    setIsLimitReached(false);
                    return;
                }
                const gravity = 9.8;
                const totalForce = (totalMass / 1000) * gravity;
                let resultExt = 0;
                let limitState = false;
                const noise = (Math.random() - 0.5) * 0.1;

                if (mode === 'single') {
                    const { ext, limit } = calculateSingleBandExtension(totalForce);
                    resultExt = ext;
                    limitState = limit;
                } else if (mode === 'series') {
                    const { ext, limit } = calculateSingleBandExtension(totalForce);
                    resultExt = ext * 2;
                    limitState = limit;
                } else if (mode === 'parallel') {
                    const { ext, limit } = calculateSingleBandExtension(totalForce / 2);
                    resultExt = ext;
                    limitState = limit;
                }
                setCurrentExtension(Math.max(0, resultExt + noise));
                setIsLimitReached(limitState);
            }, [totalMass, mode]);

            const showAlert = (title, message) => setDialog({ isOpen: true, type: 'alert', title, message, onConfirm: null });
            const showConfirm = (title, message, onConfirm) => setDialog({ isOpen: true, type: 'confirm', title, message, onConfirm });
            const closeDialog = () => setDialog(prev => ({ ...prev, isOpen: false }));
            const handleConfirm = () => { if (dialog.onConfirm) dialog.onConfirm(); closeDialog(); };

            const calculateTrendline = () => {
                const activeData = history.filter(d => d.mode === mode);
                if (activeData.length < 2) {
                    showAlert("數據不足", `請在「${getModeLabel(mode)}」模式下至少記錄兩個數據點以進行分析。`);
                    return;
                }
                const n = activeData.length;
                let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
                activeData.forEach(pt => {
                    const x = pt.extension;
                    const y = pt.mass;
                    sumX += x;
                    sumY += y;
                    sumXY += x * y;
                    sumX2 += x * x;
                });
                const denominator = (n * sumX2 - sumX * sumX);
                if (Math.abs(denominator) < 0.0001) return;
                
                const slope = (n * sumXY - sumX * sumY) / denominator;
                const intercept = (sumY - slope * sumX) / n;
                
                // R-Squared calculation
                const yMean = sumY / n;
                let ssTot = 0, ssRes = 0;
                activeData.forEach(pt => {
                    const yPred = slope * pt.extension + intercept;
                    ssTot += Math.pow(pt.mass - yMean, 2);
                    ssRes += Math.pow(pt.mass - yPred, 2);
                });
                const r2 = ssTot !== 0 ? (1 - (ssRes / ssTot)) : 0;

                const maxExt = Math.max(...activeData.map(d => d.extension));
                // 這裡將 Key 改為 'mass' 以對應 Y 軸的 dataKey，確保 Recharts 能正確讀取
                const trendPoints = [
                    { extension: 0, mass: intercept },
                    { extension: maxExt * 1.15, mass: slope * (maxExt * 1.15) + intercept }
                ];
                const k_approx = (slope * 0.98).toFixed(2);
                
                InteractionLogger.log('CalculateTrendline', { 
                    mode: mode, 
                    slope: slope.toFixed(2), 
                    intercept: intercept.toFixed(2), 
                    r2: r2.toFixed(3), 
                    k_value: k_approx 
                });

                setTrendline({
                    slope: slope.toFixed(2),
                    intercept: intercept.toFixed(2),
                    r2: r2.toFixed(3),
                    points: trendPoints,
                    k_value: k_approx,
                    mode: mode
                });
            };

            const clearData = () => showConfirm("清除確認", "確定要清除所有數據嗎？", () => { 
                setHistory([]); 
                setTrendline(null); 
                InteractionLogger.log('ClearDataHistory'); 
            });
            
            const addWeight = (amount) => {
                if (totalMass + amount > MAX_TOTAL_MASS) { 
                    showAlert("超重警告", `為了器材安全，本實驗總承重限制為 ${MAX_TOTAL_MASS}g。`); 
                    InteractionLogger.log('WeightLimitExceeded', { attemptedMass: totalMass + amount });
                    return; 
                }
                setAddedMass(prev => prev + amount);
                InteractionLogger.log('AddWeight', { amount: amount, newTotalMass: totalMass + amount });
            };
            
            const recordData = () => {
                const exists = history.some(d => d.mass === totalMass && d.mode === mode);
                if (!exists) {
                    const newForce = (totalMass * 9.8 / 1000).toFixed(2);
                    const newExt = parseFloat(currentExtension.toFixed(2));
                    setHistory(prev => [...prev, {
                        mode: mode,
                        mass: totalMass,
                        force: newForce,
                        extension: newExt
                    }].sort((a, b) => a.mass - b.mass));
                    
                    InteractionLogger.log('RecordDataPoint', { 
                        mode: mode, 
                        mass: totalMass, 
                        force: newForce, 
                        extension: newExt 
                    });
                }
            };
            
            const exportData = () => {
                InteractionLogger.log('ExportDataCSV');

                // 更新匯出標題
                const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + "模式,質量 m (g),總外力 F (N),總伸長量 x (cm),K = F/x (N/m)\n" + history.map(row => `${getModeLabel(row.mode)},${row.mass},${row.force},${row.extension}`).join("\n");
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", "彈性實驗數據_多模式.csv");
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const getModeLabel = (m) => {
                switch (m) { case 'single': return '單一橡皮筋'; case 'series': return '串聯模式'; case 'parallel': return '並聯模式'; default: return m; }
            };
            const getModeColor = (m) => {
                switch (m) { case 'single': return '#4f46e5'; case 'series': return '#9333ea'; case 'parallel': return '#059669'; default: return '#64748b'; }
            };
            const PIXELS_PER_CM = 15;
            const RUBBER_WIDTH_BASE = 8;
            const gravity = 9.8;
            const forcePerBand = mode === 'parallel' ? ((totalMass / 1000) * gravity / 2) : ((totalMass / 1000) * gravity);
            const { lambda } = calculateSingleBandExtension(forcePerBand);
            const currentWidth = Math.max(2, RUBBER_WIDTH_BASE / Math.sqrt(lambda));
            const getRubberColor = () => {
                const J1 = Math.pow(lambda, 2) + 2 / lambda - 3;
                const limit = J1 / J_LIM;
                if (limit > 0.85) return "#ef4444";
                if (lambda > 3.0) return "#eab308";
                return "#22c55e";
            };

            const renderRubberBands = () => {
                const color = getRubberColor();
                const totalVisualHeight = (mode === 'series' ? L0 * 2 + currentExtension : L0 + currentExtension) * PIXELS_PER_CM;
                const singleBandHeight = mode === 'series' ? totalVisualHeight / 2 : totalVisualHeight;
                const styleBand = { backgroundColor: color, boxShadow: isLimitReached ? '0 0 10px rgba(239, 68, 68, 0.5)' : 'none', border: '1px solid rgba(0,0,0,0.1)', transition: 'all 0.5s ease-out' };

                if (mode === 'single') return <div style={{ ...styleBand, width: `${currentWidth}px`, height: `${singleBandHeight}px` }} className="rounded-full" />;
                else if (mode === 'series') return <div className="flex flex-col items-center"><div style={{ ...styleBand, width: `${currentWidth}px`, height: `${singleBandHeight}px` }} className="rounded-t-full rounded-b-sm" /><div className="w-3 h-3 bg-slate-600 rounded-full my-[-2px] z-10 shadow-sm"></div><div style={{ ...styleBand, width: `${currentWidth}px`, height: `${singleBandHeight}px` }} className="rounded-b-full rounded-t-sm" /></div>;
                else if (mode === 'parallel') return <div className="flex justify-center gap-4"><div style={{ ...styleBand, width: `${currentWidth}px`, height: `${singleBandHeight}px` }} className="rounded-full" /><div style={{ ...styleBand, width: `${currentWidth}px`, height: `${singleBandHeight}px` }} className="rounded-full" /></div>;
            };

            const dataSingle = history.filter(d => d.mode === 'single');
            const dataSeries = history.filter(d => d.mode === 'series');
            const dataParallel = history.filter(d => d.mode === 'parallel');

            return (
                <div className="min-h-screen bg-slate-50 p-4 font-sans text-slate-800 relative">
                    {dialog.isOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm">
                            <div className="bg-white rounded-xl shadow-xl max-w-sm w-full p-6 relative border border-slate-200">
                                <button onClick={closeDialog} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><Icon name="x" /></button>
                                <div className="flex flex-col items-center text-center">
                                    <div className={`p-3 rounded-full mb-4 ${dialog.type === 'confirm' ? 'bg-red-100 text-red-600' : 'bg-amber-100 text-amber-600'}`}>
                                        {dialog.type === 'confirm' ? <Icon name="alertTriangle" size={32} /> : <Icon name="alertCircle" size={32} />}
                                    </div>
                                    <h3 className="text-xl font-bold text-slate-900 mb-2">{dialog.title}</h3>
                                    <p className="text-slate-600 mb-6">{dialog.message}</p>
                                    <div className="flex gap-3 w-full">
                                        {dialog.type === 'confirm' ? (
                                            <>
                                                <button onClick={closeDialog} className="flex-1 px-4 py-2 border border-slate-300 rounded-lg text-slate-700 hover:bg-slate-50">取消</button>
                                                <button onClick={handleConfirm} className="flex-1 px-4 py-2 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700">確定</button>
                                            </>
                                        ) : (
                                            <button onClick={closeDialog} className="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700">知道了</button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
                        <div className="lg:col-span-12 bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div>
                                <h1 className="text-2xl font-bold text-slate-900 flex items-center gap-2">
                                    🧪 橡皮筋彈力模擬實驗
                                    <span className="text-xs bg-slate-100 text-slate-600 px-2 py-1 rounded-full font-mono">v2.0 Multi-Mode</span>
                                </h1>
                                <p className="text-slate-500 mt-1 text-sm">探究 串聯 vs 並聯 的物理特性差異</p>
                            </div>
                            <div className="flex bg-slate-100 p-1 rounded-lg overflow-x-auto max-w-full">
                                {[{ id: 'single', iconName: 'minus', label: '單一' }, { id: 'series', iconName: 'gitCommit', label: '串聯' }, { id: 'parallel', iconName: 'gitFork', label: '並聯' }].map((m) => {
                                    const isActive = mode === m.id;
                                    const rotateClass = m.id === 'parallel' ? 'rotate-180' : (m.id === 'series' ? '' : 'rotate-90');
                                    return <button key={m.id} onClick={() => { 
                                        setMode(m.id); 
                                        setTrendline(null); 
                                        InteractionLogger.log('ChangeMode', { mode: m.id });
                                    }} className={`flex items-center gap-2 px-4 py-2 rounded-md text-sm font-bold transition-all whitespace-nowrap ${isActive ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}><Icon name={m.iconName} size={16} className={rotateClass} />{m.label}</button>
                                })}
                            </div>
                            <div className="flex gap-4 text-sm text-slate-600 bg-slate-50 px-4 py-2 rounded-lg border border-slate-100">
                                <div className="flex flex-col items-center"><span className="font-bold text-lg">{totalMass} g</span><span className="text-xs text-slate-400">總掛重</span></div>
                                <div className="w-px bg-slate-200 mx-2"></div>
                                <div className="flex flex-col items-center"><span className={`font-bold text-lg ${isLimitReached ? 'text-red-600 animate-pulse' : 'text-blue-600'}`}>{currentExtension.toFixed(1)} cm</span><span className="text-xs text-slate-400">伸長量</span></div>
                            </div>
                        </div>
                        <div className="lg:col-span-5 flex flex-col gap-4">
                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 h-[600px] relative overflow-hidden flex justify-center bg-grid-slate-100">
                                <div className="absolute inset-0 pointer-events-none opacity-50" style={{ backgroundImage: 'linear-gradient(#cbd5e1 1px, transparent 1px), linear-gradient(90deg, #cbd5e1 1px, transparent 1px)', backgroundSize: '20px 20px' }}></div>
                                <div className="absolute top-0 w-48 h-4 bg-slate-700 rounded-b-lg shadow-md z-10"></div>
                                <div className="absolute left-4 top-4 bottom-4 w-12 border-r-2 border-slate-400 flex flex-col items-end py-2 pr-1 text-xs text-slate-400 font-mono">
                                    {[...Array(20)].map((_, i) => <div key={i} className="h-[30px] w-full border-b border-slate-200 flex items-end justify-end relative"><span className="absolute right-2 bottom-[-8px]">{i * 2}</span><div className="w-2 h-px bg-slate-400"></div></div>)}
                                    <div className="absolute top-0 right-8 rotate-90 origin-right whitespace-nowrap text-slate-400">cm</div>
                                </div>
                                <div className="relative top-4 flex flex-col items-center transition-all duration-300 ease-out" style={{ width: '140px' }}>
                                    {renderRubberBands()}
                                    <div className="w-full flex justify-center"><div className="w-1 h-4 bg-gray-400 rounded-b-sm"></div></div>
                                    {isPanAttached ? <div className="w-32 h-2 bg-gray-600 rounded mb-1 shadow-lg relative flex justify-center items-end animate-in fade-in slide-in-from-top-4 duration-500"><div className="absolute bottom-2 flex flex-col-reverse items-center gap-px"><div className="w-20 h-4 bg-gray-500 rounded-sm border border-gray-600 flex items-center justify-center text-[10px] text-white opacity-80">秤盤 100g</div>{addedMass > 0 && <div className="w-16 h-auto max-h-[120px] bg-amber-600 rounded-sm border border-amber-700 flex items-center justify-center text-[10px] text-white shadow-sm px-2 py-1">+{addedMass}g</div>}</div><div className="text-xs text-gray-500 font-mono absolute -bottom-6 whitespace-nowrap">F = {(totalMass * 9.8 / 1000).toFixed(2)} N</div></div> : <div className="text-xs text-slate-400 mt-2 font-mono bg-slate-100 px-2 py-1 rounded">秤盤已取下</div>}
                                </div>
                                {isLimitReached && <div className="absolute top-20 right-10 bg-red-100 text-red-700 px-3 py-2 rounded-lg border border-red-200 shadow-sm flex items-center gap-2 animate-bounce"><Icon name="alertCircle" size={16} /><span className="text-xs font-bold">接近材料極限！</span></div>}
                                <div className="absolute bottom-4 right-4 text-4xl font-black text-slate-200 select-none pointer-events-none uppercase tracking-widest">{mode}</div>
                            </div>
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2"><Icon name="plus" size={18} className="text-blue-500" /> 控制台</h3>
                                <div className="flex gap-2 mb-4"><button onClick={() => { const newState = !isPanAttached; setIsPanAttached(newState); InteractionLogger.log('TogglePan', { isAttached: newState }); }} className={`flex-1 py-3 px-4 rounded-lg font-bold transition-all flex items-center justify-center gap-2 ${isPanAttached ? 'bg-amber-100 text-amber-800 hover:bg-amber-200' : 'bg-emerald-100 text-emerald-800 hover:bg-emerald-200'}`}><Icon name="anchor" size={18} />{isPanAttached ? '取下秤盤' : '掛上秤盤 (100g)'}</button></div>
                                <div className="grid grid-cols-4 gap-2 mb-4">{[1, 5, 10, 50].map((w) => <button key={w} onClick={() => addWeight(w)} disabled={!isPanAttached || totalMass + w > MAX_TOTAL_MASS} className="bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 py-3 rounded-lg font-bold transition-colors disabled:opacity-40 disabled:cursor-not-allowed flex flex-col items-center justify-center"><span className="text-lg">+{w}</span><span className="text-xs font-normal">克</span></button>)}</div>
                                <div className="flex gap-2"><button onClick={() => { setAddedMass(0); InteractionLogger.log('ClearWeight'); }} disabled={!isPanAttached || addedMass === 0} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 py-2 rounded-lg text-sm font-medium transition-colors disabled:opacity-40">清空砝碼</button><button onClick={recordData} disabled={!isPanAttached} className="flex-[2] bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg text-sm font-bold shadow-sm shadow-indigo-200 active:scale-95 transition-all disabled:opacity-40 disabled:scale-100">記錄目前數據點</button></div>
                            </div>
                        </div>
                        <div className="lg:col-span-7 flex flex-col gap-6">
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex-1 min-h-[400px]">
                                <div className="flex justify-between items-center mb-4 flex-wrap gap-2">
                                    <h3 className="font-bold text-slate-800">📊 實驗數據比較圖</h3>
                                    <div className="flex gap-2 text-xs">
                                        <div className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-indigo-600"></div>單一</div>
                                        <div className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-purple-600"></div>串聯</div>
                                        <div className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-emerald-600"></div>並聯</div>
                                    </div>
                                </div>
                                <div className="h-[350px] w-full relative">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <ScatterChart margin={{ top: 20, right: 20, bottom: 20, left: 20 }}>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
                                            <XAxis type="number" dataKey="extension" name="伸長量" unit="cm" domain={[0, 'auto']} label={{ value: '總伸長量 x (cm)', position: 'insideBottomRight', offset: -10 }} />
                                            <YAxis type="number" dataKey="mass" name="重量" unit="g" domain={[0, 1000]} label={{ value: '總質量 m (g)', angle: -90, position: 'insideLeft' }} />
                                            <Tooltip cursor={{ strokeDasharray: '3 3' }} />
                                            <Scatter name="單一橡皮筋" data={dataSingle} fill={getModeColor('single')} shape="circle" />
                                            <Scatter name="串聯模式" data={dataSeries} fill={getModeColor('series')} shape="triangle" />
                                            <Scatter name="並聯模式" data={dataParallel} fill={getModeColor('parallel')} shape="square" />
                                            {trendline && <Scatter name="趨勢線" data={trendline.points} line={{ stroke: '#ef4444', strokeWidth: 2, strokeDasharray: '5 5' }} shape={() => null} dataKey="mass" />}
                                        </ScatterChart>
                                    </ResponsiveContainer>
                                    {trendline && (
                                        <div className="absolute top-2 left-16 bg-white/95 backdrop-blur border p-3 rounded-lg shadow-sm text-sm z-10" style={{ borderColor: getModeColor(trendline.mode) }}>
                                            <div className="font-bold mb-1 flex items-center gap-1" style={{ color: getModeColor(trendline.mode) }}><Icon name="trendingUp" size={14} /> {getModeLabel(trendline.mode)} 趨勢分析</div>
                                            <div className="font-mono text-slate-700 text-xs">y = {trendline.slope}x + {trendline.intercept}</div>
                                            <div className="text-xs text-slate-500 mt-1">R² = {trendline.r2}</div>
                                            <div className="border-t border-slate-100 my-1"></div>
                                            <div className="font-bold text-slate-800">等效 K ≈ {trendline.k_value} N/m</div>
                                            <div className="text-[10px] text-slate-400 mt-1">* K值說明: 斜率(g/cm) × 0.98 = K(N/m)</div>
                                        </div>
                                    )}
                                </div>
                            </div>
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex-1">
                                <div className="flex justify-between items-center mb-4 flex-wrap gap-2">
                                    <h3 className="font-bold text-slate-800">📝 數據記錄表</h3>
                                    <div className="flex gap-2">
                                        <button onClick={calculateTrendline} disabled={history.filter(d => d.mode === mode).length < 2} className="px-3 py-2 text-indigo-600 bg-indigo-50 hover:bg-indigo-100 rounded-lg text-sm font-bold flex items-center gap-2 transition-colors disabled:opacity-30 disabled:cursor-not-allowed" title={`分析「${getModeLabel(mode)}」的趨勢線`}><Icon name="calculator" size={16} /> 分析目前模式</button>
                                        <div className="w-px bg-slate-200 mx-1"></div>
                                        <button onClick={exportData} disabled={history.length === 0} className="p-2 text-slate-600 hover:text-blue-600 hover:bg-blue-50 rounded disabled:opacity-30"><Icon name="download" size={18} /></button>
                                        <button onClick={clearData} disabled={history.length === 0} className="p-2 text-slate-600 hover:text-red-600 hover:bg-red-50 rounded disabled:opacity-30"><Icon name="trash2" size={18} /></button>
                                    </div>
                                </div>
                                <div className="mb-2 text-xs text-slate-500">
                                    * 說明：表格中的 K 值係針對單次測量數據計算 (<span className="font-mono">K = F / x</span>)，即割線模數。
                                </div>
                                <div className="overflow-x-auto max-h-[250px] overflow-y-auto border rounded-lg">
                                    <table className="w-full text-sm text-left text-slate-600">
                                        <thead className="text-xs text-slate-700 uppercase bg-slate-50 sticky top-0"><tr><th className="px-4 py-3">模式</th><th className="px-4 py-3">質量 m (g)</th><th className="px-4 py-3">總外力 F (N)</th><th className="px-4 py-3">總伸長量 x (cm)</th><th className="px-4 py-3">K = F/x (N/m)</th></tr></thead>
                                        <tbody>
                                            {history.length === 0 ? <tr><td colSpan="5" className="px-6 py-8 text-center text-slate-400 italic">尚未記錄數據，請切換模式並操作...</td></tr> : history.map((row, index) => { const k = row.extension > 0 ? (row.force / (row.extension / 100)).toFixed(1) : "-"; return <tr key={index} className="bg-white border-b hover:bg-slate-50"><td className="px-4 py-3"><span className="px-2 py-1 rounded text-xs font-bold text-white" style={{ backgroundColor: getModeColor(row.mode) }}>{getModeLabel(row.mode)}</span></td><td className="px-4 py-3 font-medium text-slate-900">{row.mass}</td><td className="px-4 py-3">{row.force}</td><td className="px-4 py-3">{row.extension}</td><td className="px-4 py-3 text-slate-500">{k}</td></tr> })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
