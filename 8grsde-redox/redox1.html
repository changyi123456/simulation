<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>氧化還原探究 - 古鏡冶煉篇</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* 沉浸式暗黑工坊背景 */
        body { margin: 0; padding: 0; background-color: #1c1917; background-image: radial-gradient(circle at 50% 50%, #292524 0%, #1c1917 100%); color: #e7e5e4; }
        
        .transition-all-slow { transition: all 1.5s ease-in-out; }
        .font-serif-tc { font-family: "Noto Serif TC", "PMingLiU", serif; }
        
        /* 羊皮紙質感 */
        .parchment {
            background-color: #e8dcb8;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
            color: #292524;
            box-shadow: inset 0 0 20px rgba(139, 69, 19, 0.3);
        }

        /* 火焰動畫 */
        @keyframes flicker {
            0%, 100% { transform: scale(1) rotate(-2deg); opacity: 0.8; filter: drop-shadow(0 0 15px rgba(239, 68, 68, 0.5)); }
            50% { transform: scale(1.1) rotate(2deg); opacity: 1; filter: drop-shadow(0 0 25px rgba(245, 158, 11, 0.9)); }
        }
        .animate-flame { animation: flicker 0.4s infinite alternate; }

        /* 爆炸白光動畫 (鎂) */
        @keyframes explosion {
            0% { transform: scale(1); opacity: 0.8; background-color: white; filter: brightness(1); }
            30% { transform: scale(4); opacity: 1; background-color: #fff; filter: brightness(3); box-shadow: 0 0 100px #fff; }
            100% { transform: scale(1); opacity: 0; }
        }
        .animate-explosion { animation: explosion 1.2s ease-out forwards; }

        /* 水蒸氣動畫 (氫氣) */
        @keyframes steam {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0; }
            50% { transform: translateY(-30px) scale(1.5) rotate(10deg); opacity: 0.6; }
            100% { transform: translateY(-60px) scale(2) rotate(-10deg); opacity: 0; }
        }
        .animate-steam { animation: steam 2s ease-out forwards; }

        /* 鏡面光澤掃過 */
        @keyframes shine {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        .shine-effect::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-20deg);
            animation: shine 3s infinite;
        }

        /* 儀表板與按鈕的黃銅質感 */
        .brass-btn {
            background: linear-gradient(to bottom, #78532c 0%, #52361b 100%);
            border: 1px solid #a1723c;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 4px 6px rgba(0,0,0,0.5);
            color: #fde68a;
        }
        .brass-btn:hover { background: linear-gradient(to bottom, #8a6236 0%, #634223 100%); }
        .brass-btn:disabled { background: #3f3f46; border-color: #27272a; color: #71717a; box-shadow: none; cursor: not-allowed; }
        
        .agent-card {
            background: rgba(30, 27, 24, 0.8);
            border: 1px solid #44403c;
            transition: all 0.2s;
        }
        .agent-card:hover:not(.disabled) {
            border-color: #d97706;
            background: rgba(69, 39, 16, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(217, 119, 6, 0.2);
        }
        .agent-card.selected {
            border-color: #fbbf24;
            background: rgba(120, 53, 15, 0.9);
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.3);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 1. Interaction Logger (數據追蹤工具)
        // ==========================================
        const STORAGE_KEY = "TaskInteractionData";
        let interactionHistory = [];

        const InteractionLogger = {
            init: function() {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try {
                        const parsed = JSON.parse(stored);
                        if (Array.isArray(parsed)) {
                            interactionHistory = parsed;
                        }
                    } catch (e) {
                        console.warn("Failed to parse existing interaction data", e);
                        interactionHistory = [];
                    }
                }
                this.log('Initialize', { timestamp: new Date().toISOString(), sim: "Redox_Smelting_Lab" });
            },

            log: function(action, details = {}) {
                const event = {
                    timestamp: new Date().toISOString(),
                    action: action,
                    details: details
                };
                interactionHistory.push(event);
                if (interactionHistory.length > 500) {
                    interactionHistory.shift();
                }
                localStorage.setItem(STORAGE_KEY, JSON.stringify(interactionHistory));
            },

            clear: function() {
                interactionHistory = [];
                localStorage.setItem(STORAGE_KEY, JSON.stringify([]));
            }
        };

        // ==========================================
        // 2. React 應用程式
        // ==========================================
        const { useState, useEffect, useRef } = React;

        // --- 試劑與工具資料設定 (擴充至 7 種) ---
        const AGENTS = [
            { id: "gold", name: "🥇 金箔 (Au)", desc: "極度安定的貴金屬。", type: "metal" },
            { id: "silver", name: "🥈 銀粉 (Ag)", desc: "安定的金屬，常做飾品。", type: "metal" },
            { id: "iron", name: "🧲 鐵粉 (Fe)", desc: "常見的金屬，容易生鏽。", type: "metal" },
            { id: "magnesium", name: "💥 鎂粉 (Mg)", desc: "極易燃燒，發出強烈白光。", type: "metal" },
            { id: "carbon", name: "⚫ 碳粉 (C)", desc: "便宜的非金屬，冶煉常用。", type: "non-metal" },
            { id: "hydrogen", name: "💨 氫氣流 (H₂)", desc: "極輕的氣體，具可燃性。", type: "gas" },
            { id: "oxygen", name: "🌬️ 純氧氣 (O₂)", desc: "幫助燃燒的氣體。", type: "gas" }
        ];

        function App() {
            // 初始化 Logger
            useEffect(() => {
                InteractionLogger.init();
            }, []);

            const [selectedAgent, setSelectedAgent] = useState("gold");
            const [isAnimating, setIsAnimating] = useState(false);
            const [animationEffect, setAnimationEffect] = useState(""); 
            
            // 鏡子狀態: default(CuO), restored_c(Cu), restored_h2(Cu), destroyed(破裂), ruined_fe(鐵鏽)
            const [mirrorStatus, setMirrorStatus] = useState("default"); 
            
            const [records, setRecords] = useState([]);
            const recordsEndRef = useRef(null);

            const handleReset = () => {
                if(isAnimating) return;
                
                // 紀錄重置鏡子事件
                InteractionLogger.log('ResetMirror');
                
                setMirrorStatus("default");
                setAnimationEffect("");
            };

            const handleSelectAgent = (agentId, agentName) => {
                setSelectedAgent(agentId);
                // 紀錄選擇試劑事件
                InteractionLogger.log('SelectAgent', { agentId: agentId, agentName: agentName });
            };

            const handleAction = () => {
                if(isAnimating || mirrorStatus !== "default") return;
                
                setIsAnimating(true);
                const agent = AGENTS.find(a => a.id === selectedAgent);
                
                // 紀錄開始加熱事件
                InteractionLogger.log('StartSmelting', { agentId: agent.id, agentName: agent.name });
                
                // 決定前置動畫特效
                if (selectedAgent === "magnesium") setAnimationEffect("explosion");
                else if (selectedAgent === "hydrogen") setAnimationEffect("steam");
                else setAnimationEffect("flame"); // 預設都是點火加熱
                
                // 模擬加熱反應時間
                setTimeout(() => {
                    let resultStatus = "default";
                    let logTitle = "";
                    let logMsg = "";
                    let isSuccess = false;

                    switch(selectedAgent) {
                        case "gold":
                        case "silver":
                            resultStatus = "default";
                            logTitle = "無反應";
                            logMsg = "毫無變化，古鏡依然是一塊黑色的氧化銅。";
                            isSuccess = false;
                            break;
                        case "oxygen":
                            resultStatus = "default";
                            logTitle = "無反應";
                            logMsg = "毫無變化，古鏡依然是一塊黑色的氧化銅。";
                            isSuccess = false;
                            break;
                        case "iron":
                            resultStatus = "ruined_fe";
                            logTitle = "修復失敗 (產生鐵鏽)";
                            logMsg = "古鏡表面生成了紅褐色的鐵鏽，並死死黏附在上面，文物外觀已損毀。";
                            isSuccess = false;
                            break;
                        case "magnesium":
                            resultStatus = "destroyed";
                            logTitle = "修復失敗 (古物炸毀)";
                            logMsg = "發出刺眼強光並發生劇烈爆炸，古鏡被炸成了碎片！";
                            isSuccess = false;
                            break;
                        case "carbon":
                            resultStatus = "restored_c";
                            logTitle = "修復成功！";
                            logMsg = "冒出些許氣體，黑色的外層逐漸褪去，古鏡恢復了紅褐色的純銅光澤！";
                            isSuccess = true;
                            break;
                        case "hydrogen":
                            resultStatus = "restored_h2";
                            logTitle = "修復成功！";
                            logMsg = "表面冒出大量水蒸氣，黑色的外層逐漸褪去，古鏡恢復了紅褐色的純銅光澤！";
                            isSuccess = true;
                            break;
                    }

                    // 紀錄實驗結果事件
                    InteractionLogger.log('SmeltingResult', { 
                        agentId: agent.id, 
                        result: resultStatus, 
                        success: isSuccess 
                    });

                    setMirrorStatus(resultStatus);
                    setIsAnimating(false);
                    if (selectedAgent !== "hydrogen") {
                         setAnimationEffect(""); // 氫氣保留一點蒸氣感，其他關閉
                    }
                    
                    setRecords(prev => [...prev, {
                        id: Date.now(),
                        agent: agent.name,
                        title: logTitle,
                        msg: logMsg,
                        success: isSuccess
                    }]);
                }, 1500); // 1.5秒動畫時間
            };

            // 自動捲動日誌
            useEffect(() => {
                if (recordsEndRef.current) {
                    recordsEndRef.current.scrollIntoView({ behavior: "smooth" });
                }
            }, [records]);

            // --- 繪製鏡子視覺元件 ---
            const renderMirror = () => {
                let mirrorClasses = "bg-[#292524] border-[#1c1917] shadow-[inset_0_0_20px_#000]"; // 預設黑漆漆的 CuO
                let innerContent = <span className="text-6xl opacity-10 font-serif-tc">龍</span>;
                let extraEffect = null;

                if (mirrorStatus === "restored_c" || mirrorStatus === "restored_h2") {
                    mirrorClasses = "bg-[#b45309] border-[#78350f] shadow-[0_0_40px_rgba(217,119,6,0.4),inset_0_0_15px_rgba(251,191,36,0.3)] shine-effect"; // 閃亮的純銅 Cu
                    innerContent = <span className="text-6xl text-[#fde68a] opacity-80 font-serif-tc drop-shadow-md">龍</span>;
                } else if (mirrorStatus === "destroyed") {
                    mirrorClasses = "bg-[#44403c] border-[#292524] border-dashed opacity-60 transform scale-95";
                    innerContent = <span className="text-4xl text-red-500 font-bold drop-shadow-md">💥 碎裂</span>;
                } else if (mirrorStatus === "ruined_fe") {
                    mirrorClasses = "bg-[#451a03] border-[#292524] shadow-[inset_0_0_30px_#000]"; // 鐵鏽色
                    // 加上鐵鏽斑塊
                    extraEffect = (
                        <div className="absolute inset-0 rounded-full overflow-hidden opacity-70">
                            <div className="absolute top-4 left-6 w-12 h-10 bg-[#7f1d1d] rounded-full blur-md"></div>
                            <div className="absolute bottom-6 right-8 w-16 h-12 bg-[#991b1b] rounded-full blur-sm"></div>
                            <div className="absolute top-1/2 left-1/4 w-8 h-8 bg-[#f87171] mix-blend-overlay rounded-full blur-sm"></div>
                        </div>
                    );
                    innerContent = <span className="text-6xl opacity-20 font-serif-tc text-red-900 z-10">龍</span>;
                }

                return (
                    <div className="relative w-64 h-64 flex items-center justify-center">
                        {/* 爆炸特效 */}
                        {animationEffect === "explosion" && <div className="absolute inset-0 rounded-full animate-explosion z-40 pointer-events-none"></div>}
                        
                        {/* 水蒸氣特效 */}
                        {animationEffect === "steam" && (
                            <div className="absolute -top-10 w-full h-full flex justify-center z-40 pointer-events-none">
                                <span className="text-6xl animate-steam opacity-0 delay-500">☁️</span>
                                <span className="text-5xl animate-steam opacity-0 delay-700 ml-4">💨</span>
                            </div>
                        )}

                        {/* 銅鏡本體 (帶有古老金屬質感的邊框) */}
                        <div className="w-56 h-56 rounded-full bg-gradient-to-br from-[#44403c] to-[#1c1917] p-2 flex items-center justify-center shadow-[0_15px_30px_rgba(0,0,0,0.8)] z-10">
                            <div className={`relative w-full h-full rounded-full border-[8px] flex items-center justify-center overflow-hidden transition-all-slow ${mirrorClasses}`}>
                                {extraEffect}
                                <div className={`w-[85%] h-[85%] rounded-full border-2 flex items-center justify-center transition-all-slow relative z-20 ${mirrorStatus.startsWith('restored') ? 'border-[#fcd34d]/40' : 'border-[#57534e]/30'}`}>
                                    {innerContent}
                                </div>
                            </div>
                        </div>
                        
                        {/* 加熱火焰 */}
                        {animationEffect === "flame" && (
                            <div className="absolute -bottom-10 flex gap-2 z-30 pointer-events-none">
                                <span className="text-6xl animate-flame">🔥</span>
                                <span className="text-5xl animate-flame mt-2">🔥</span>
                            </div>
                        )}

                        {/* 放置古鏡的底座 */}
                        <div className="absolute -bottom-4 w-40 h-8 bg-[#292524] rounded-full blur-sm -z-10"></div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen p-4 sm:p-6 lg:p-8 flex flex-col lg:flex-row gap-8 items-stretch font-serif-tc selection:bg-amber-900 selection:text-amber-100">
                    
                    {/* 左側：煉金冶煉爐 (觀測區) */}
                    <div className="w-full lg:w-1/2 flex flex-col">
                        <div className="bg-[#1e1c19] rounded-xl shadow-[0_0_40px_rgba(0,0,0,0.8)] flex flex-col border border-[#3f3f46] h-full overflow-hidden relative">
                            
                            {/* 頂部裝飾條 */}
                            <div className="h-2 w-full bg-gradient-to-r from-[#78532c] via-[#b48a54] to-[#78532c]"></div>

                            <div className="p-5 sm:p-8 flex flex-col flex-grow relative z-10">
                                <div className="mb-6 flex items-center justify-between">
                                    <h1 className="text-3xl font-bold text-[#fbbf24] tracking-wider drop-shadow-md">👁️‍🗨️ 古董冶煉爐</h1>
                                    <div className="px-3 py-1 bg-[#292524] border border-[#44403c] rounded text-xs text-[#a8a29e] font-sans tracking-widest uppercase">Target: CuO</div>
                                </div>
                                
                                <p className="text-[#d6d3d1] text-sm leading-loose mb-8 font-sans bg-[#292524]/60 p-4 rounded-lg border-l-4 border-[#b45309]">
                                    這面刻有古老圖騰的青銅鏡，因埋藏千年，表面已經完全氧化成黑色的<strong className="text-[#fbbf24]">「氧化銅 (CuO)」</strong>。<br/>
                                    你必須挑選一種合適的試劑，透過<strong className="text-red-400">高溫冶煉 (奪氧)</strong>，將其還原回純銅 (Cu)。請小心，錯誤的選擇將毀滅這件稀世珍寶！
                                </p>

                                {/* 視覺舞台 */}
                                <div className="flex-grow w-full flex flex-col items-center justify-center bg-gradient-to-b from-[#171717] to-[#0a0a0a] rounded-lg border border-[#292524] shadow-[inset_0_20px_50px_rgba(0,0,0,0.5)] relative min-h-[350px]">
                                    {renderMirror()}
                                    
                                    {/* 狀態標籤 */}
                                    <div className="absolute top-4 right-4 flex gap-2 font-sans font-bold">
                                        {mirrorStatus === "default" && <span className="bg-[#44403c] text-[#a8a29e] text-xs px-3 py-1.5 rounded-sm border border-[#57534e]">狀態：嚴重氧化</span>}
                                        {mirrorStatus.startsWith("restored") && <span className="bg-[#064e3b] text-[#34d399] text-xs px-3 py-1.5 rounded-sm border border-[#059669] shadow-[0_0_10px_#059669] animate-pulse">✨ 完美還原</span>}
                                        {mirrorStatus === "ruined_fe" && <span className="bg-[#451a03] text-[#f87171] text-xs px-3 py-1.5 rounded-sm border border-[#991b1b]">⚠️ 鐵鏽沾黏</span>}
                                        {mirrorStatus === "destroyed" && <span className="bg-[#7f1d1d] text-[#fca5a5] text-xs px-3 py-1.5 rounded-sm border border-[#b91c1c]">☠️ 文物損毀</span>}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 右側：試劑架與修復日誌 */}
                    <div className="w-full lg:w-1/2 flex flex-col gap-6 h-full">
                        
                        {/* 試劑控制台 */}
                        <div className="bg-[#292524] rounded-xl shadow-[0_10px_30px_rgba(0,0,0,0.6)] p-5 sm:p-6 flex flex-col border border-[#44403c] shrink-0">
                            <div className="flex justify-between items-center mb-5 border-b border-[#44403c] pb-3">
                                <h2 className="text-xl font-bold text-[#e7e5e4]">🧪 冶煉試劑架</h2>
                                <button 
                                    onClick={handleReset} 
                                    disabled={isAnimating || mirrorStatus === "default"}
                                    className={`text-xs font-bold py-1.5 px-3 rounded flex items-center gap-1 font-sans ${isAnimating || mirrorStatus === "default" ? 'bg-[#1c1917] text-[#57534e] border border-[#292524] cursor-not-allowed' : 'bg-[#44403c] text-[#e7e5e4] border border-[#57534e] hover:bg-[#57534e] active:scale-95 transition-all'}`}
                                >
                                    🔄 換一面新鏡子
                                </button>
                            </div>

                            <div className="mb-6 font-sans">
                                <h3 className="text-[#a8a29e] text-xs mb-3 font-bold tracking-widest uppercase">Select Reducing Agent :</h3>
                                <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                    {AGENTS.map(agent => (
                                        <button
                                            key={agent.id}
                                            onClick={() => handleSelectAgent(agent.id, agent.name)}
                                            disabled={mirrorStatus !== "default" || isAnimating}
                                            className={`agent-card p-3 rounded text-left flex flex-col gap-1 ${(mirrorStatus !== "default" || isAnimating) ? 'disabled opacity-40 cursor-not-allowed' : 'cursor-pointer'} ${selectedAgent === agent.id ? 'selected' : ''}`}
                                        >
                                            <span className="font-bold text-sm text-[#e7e5e4]">{agent.name}</span>
                                            <span className="text-[10px] text-[#a8a29e] leading-tight">{agent.desc}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <button 
                                onClick={handleAction}
                                disabled={mirrorStatus !== "default" || isAnimating}
                                className={`w-full py-3.5 rounded font-bold tracking-widest text-lg font-sans transition-all ${mirrorStatus !== "default" || isAnimating ? 'bg-[#3f3f46] text-[#71717a] cursor-not-allowed' : 'brass-btn active:scale-[0.98]'}`}
                            >
                                {isAnimating ? "🔥 冶煉進行中..." : "🔥 撒上試劑並點火加熱"}
                            </button>
                        </div>

                        {/* 古老羊皮紙日誌 */}
                        <div className="parchment rounded-lg flex flex-col overflow-hidden border-4 border-[#78532c] flex-grow min-h-[350px]">
                            <div className="bg-[#78532c] text-[#fef3c7] p-3 shrink-0 flex justify-between items-center shadow-md">
                                <h2 className="text-lg font-bold flex items-center gap-2">📜 冶煉觀測手札</h2>
                            </div>
                            
                            <div className="flex-grow p-5 sm:p-6 overflow-y-auto font-sans">
                                <div className="space-y-4">
                                    {records.length === 0 ? (
                                        <div className="text-center py-12 text-[#854d0e]/60 text-sm font-serif-tc text-lg opacity-60">
                                            筆墨未落，尚無記載...
                                        </div>
                                    ) : (
                                        records.map((rec) => (
                                            <div key={rec.id} className="relative pb-4 border-b border-[#b48a54]/30 last:border-0">
                                                <div className="flex justify-between items-end mb-1.5">
                                                    <span className="font-bold text-[#78350f] text-base">{rec.agent}</span>
                                                    <span className={`text-xs font-bold px-2 py-0.5 border-2 rounded-sm transform rotate-[-2deg] ${rec.success ? 'border-[#059669] text-[#059669]' : (rec.title.includes('無反應') ? 'border-[#78716c] text-[#78716c]' : 'border-[#dc2626] text-[#dc2626]')}`}>
                                                        {rec.title}
                                                    </span>
                                                </div>
                                                <div className="text-sm text-[#451a03] leading-relaxed font-medium">
                                                    {rec.msg}
                                                </div>
                                            </div>
                                        ))
                                    )}
                                    <div ref={recordsEndRef} />
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
