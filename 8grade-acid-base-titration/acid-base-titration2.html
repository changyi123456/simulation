<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酸鹼滴定實驗室 - 傳統探究版</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f3f4f6; }
        .liquid-transition { transition: all 0.5s ease-in-out; }
        .flask-clip {
            clip-path: polygon(40% 5%, 60% 5%, 60% 30%, 90% 95%, 10% 95%, 40% 30%);
        }
        .teardrop {
            width: 10px;
            height: 14px;
            background-color: rgba(147, 197, 253, 0.8);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            position: absolute;
            transform: translateX(-50%);
            left: 50%;
        }
        @keyframes fall {
            0% { transform: translate(-50%, 0) scale(0.6); opacity: 1; }
            70% { opacity: 1; }
            /* 縮短掉落距離以符合新的緊湊版面 */
            100% { transform: translate(-50%, 80px) scale(0.9); opacity: 0; }
        }
        .animate-fall {
            animation: fall 0.4s cubic-bezier(0.4, 0, 0.6, 1) forwards;
        }
        .liquid-surface {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 100%);
            border-radius: 50%;
        }
        /* 自訂捲軸樣式，讓表格區看起來更精緻 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 1. Interaction Logger (數據追蹤工具)
        // ==========================================
        const STORAGE_KEY = "TaskInteractionData";
        let interactionHistory = [];

        const InteractionLogger = {
            init: function() {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try {
                        const parsed = JSON.parse(stored);
                        if (Array.isArray(parsed)) {
                            interactionHistory = parsed;
                        }
                    } catch (e) {
                        console.warn("Failed to parse existing interaction data", e);
                        interactionHistory = [];
                    }
                }
                // 更新識別碼為 AcidBase_Titration_Traditional_Lab
                this.log('Initialize', { timestamp: new Date().toISOString(), sim: "AcidBase_Titration_Traditional_Lab" });
            },

            log: function(action, details = {}) {
                const event = {
                    timestamp: new Date().toISOString(),
                    action: action,
                    details: details
                };
                interactionHistory.push(event);
                if (interactionHistory.length > 500) {
                    interactionHistory.shift();
                }
                localStorage.setItem(STORAGE_KEY, JSON.stringify(interactionHistory));
            },

            clear: function() {
                interactionHistory = [];
                localStorage.setItem(STORAGE_KEY, JSON.stringify([]));
            }
        };

        // ==========================================
        // 2. React 應用程式
        // ==========================================
        const { useState, useEffect, useRef } = React;

        // 實驗參數設定
        const ACID_VOL = 15.0; // 15 mL 的未知強酸
        const ACID_M = 1.0;    // 未知酸的真實濃度為 1.0M
        const MAX_BURETTE_VOL = 50.0;

        // 定義可選的鹼性液體
        const TITRANTS = {
            "NaOH_0.4": { name: "氫氧化鈉 (NaOH) 0.4M", ohConc: 0.4 }, 
            "KOH_0.8": { name: "氫氧化鉀 (KOH) 0.8M", ohConc: 0.8 },    
            "CaOH2_0.2": { name: "氫氧化鈣 (Ca(OH)₂) 0.2M", ohConc: 0.4 } 
        };

        // 定義可選的指示劑
        const INDICATORS = {
            "phenolphthalein": { name: "酚酞", range: "8.2~10.0" },
            "methyl_orange": { name: "甲基橙", range: "3.1~4.4" },
            "btb": { name: "溴瑞香草酚藍", range: "6.0~7.6" }
        };

        const calculatePH = (addedVol, currentMolesOH) => {
            const molesH = ACID_M * ACID_VOL; 
            const totalVol = ACID_VOL + addedVol;

            if (Math.abs(molesH - currentMolesOH) < 0.0001) {
                return 7.0; 
            } else if (molesH > currentMolesOH) {
                const concH = (molesH - currentMolesOH) / totalVol;
                return -Math.log10(concH);
            } else {
                const concOH = (currentMolesOH - molesH) / totalVol;
                return 14 + Math.log10(concOH);
            }
        };

        const getIndicatorColor = (pH, indicatorKey) => {
            if (indicatorKey === "phenolphthalein") {
                if (pH < 8.2) return 'rgba(240, 245, 255, 0.35)';
                if (pH >= 10.0) return 'rgba(236, 72, 153, 0.85)';
                const opacity = 0.35 + ((pH - 8.2) / 1.8) * 0.5;
                return `rgba(236, 72, 153, ${opacity})`;
            } else if (indicatorKey === "methyl_orange") {
                if (pH < 3.1) return 'rgba(220, 30, 30, 0.85)'; 
                if (pH >= 4.4) return 'rgba(255, 170, 0, 0.85)'; 
                const ratio = (pH - 3.1) / 1.3;
                const r = 220 + (255 - 220) * ratio;
                const g = 30 + (170 - 30) * ratio;
                const b = 30 + (0 - 30) * ratio;
                return `rgba(${r}, ${g}, ${b}, 0.85)`;
            } else if (indicatorKey === "btb") {
                if (pH < 6.0) return 'rgba(240, 210, 20, 0.85)'; 
                if (pH >= 7.6) return 'rgba(20, 100, 200, 0.85)'; 
                const ratio = (pH - 6.0) / 1.6;
                const r = 240 + (20 - 240) * ratio;
                const g = 210 + (100 - 210) * ratio;
                const b = 20 + (200 - 20) * ratio;
                return `rgba(${r}, ${g}, ${b}, 0.85)`;
            }
        };

        const getIndicatorColorName = (pH, indicatorKey) => {
            if (indicatorKey === "phenolphthalein") {
                if (pH < 8.2) return '透明無色';
                if (pH >= 10.0) return '深粉紅色';
                return '微透明粉紅';
            } else if (indicatorKey === "methyl_orange") {
                if (pH < 3.1) return '紅色';
                if (pH >= 4.4) return '黃色';
                return '橙色';
            } else if (indicatorKey === "btb") {
                if (pH < 6.0) return '黃色';
                if (pH >= 7.6) return '藍色';
                return '綠色';
            }
        };

        function App() {
            // 初始化 Logger
            useEffect(() => {
                InteractionLogger.init();
            }, []);

            const [addedBase, setAddedBase] = useState(0.0);
            const [molesOH, setMolesOH] = useState(0.0);
            
            const [selectedTitrant, setSelectedTitrant] = useState("NaOH_0.4");
            const [selectedIndicator, setSelectedIndicator] = useState("phenolphthalein");
            
            const [records, setRecords] = useState([{
                id: Date.now(),
                addedV: '0.00',
                colorObv: getIndicatorColorName(calculatePH(0, 0), "phenolphthalein"),
                titrantName: '-',
                indicatorName: '酚酞'
            }]);
            
            const [showResetConfirm, setShowResetConfirm] = useState(false);
            const [errorMsg, setErrorMsg] = useState("");
            const [showTotal, setShowTotal] = useState(false);
            const [droplets, setDroplets] = useState([]);

            const currentPH = calculatePH(addedBase, molesOH);
            const currentColor = getIndicatorColor(currentPH, selectedIndicator);
            const activeIndicatorInfo = INDICATORS[selectedIndicator];
            
            const handleDrop = (amount) => {
                if (addedBase + amount > MAX_BURETTE_VOL) {
                    setErrorMsg("滴定管已經空了！請倒掉重新實驗。");
                    return;
                }

                const currentTitrantInfo = TITRANTS[selectedTitrant];
                const addedMolesOH = amount * currentTitrantInfo.ohConc;

                const dropCount = amount >= 1.0 ? 5 : (amount >= 0.1 ? 2 : 1);
                for (let i = 0; i < dropCount; i++) {
                    setTimeout(() => {
                        const dropId = Date.now() + Math.random();
                        setDroplets(prev => [...prev, { id: dropId }]);
                        setTimeout(() => {
                            setDroplets(prev => prev.filter(d => d.id !== dropId));
                        }, 400); 
                    }, i * 80); 
                }

                const newVol = addedBase + amount;
                const newMolesOH = molesOH + addedMolesOH;
                const newPH = calculatePH(newVol, newMolesOH);
                const observedColor = getIndicatorColorName(newPH, selectedIndicator);
                
                // 紀錄滴加行為
                InteractionLogger.log('AddTitrant', { 
                    dropAmount: amount, 
                    totalVolume: newVol, 
                    titrantName: currentTitrantInfo.name,
                    indicatorName: activeIndicatorInfo.name,
                    colorObserved: observedColor
                });

                setAddedBase(newVol);
                setMolesOH(newMolesOH);
                
                setRecords(prev => [...prev, {
                    id: Date.now(),
                    addedV: newVol.toFixed(2),
                    colorObv: observedColor,
                    titrantName: currentTitrantInfo.name.split(' ')[0],
                    indicatorName: activeIndicatorInfo.name
                }]);
                
                setErrorMsg("");
                setShowTotal(false);
            };

            const confirmReset = () => {
                // 紀錄重新實驗行為
                InteractionLogger.log('ResetExperiment');

                setAddedBase(0.0);
                setMolesOH(0.0);
                const initialPH = calculatePH(0, 0);
                setRecords([{
                    id: Date.now(),
                    addedV: '0.00',
                    colorObv: getIndicatorColorName(initialPH, selectedIndicator),
                    titrantName: '-',
                    indicatorName: activeIndicatorInfo.name
                }]);
                setShowResetConfirm(false);
                setErrorMsg("");
                setShowTotal(false);
            };

            const handleIndicatorChange = (e) => {
                const newIndicatorId = e.target.value;
                setSelectedIndicator(newIndicatorId);
                
                // 紀錄更改指示劑行為
                InteractionLogger.log('SelectIndicator', { 
                    indicatorId: newIndicatorId, 
                    indicatorName: INDICATORS[newIndicatorId].name 
                });
            };

            const recordsEndRef = useRef(null);
            useEffect(() => {
                if (recordsEndRef.current) {
                    recordsEndRef.current.scrollIntoView({ behavior: "smooth" });
                }
            }, [records]);

            return (
                <div className="min-h-screen p-4 sm:p-6 font-sans text-gray-800 flex flex-col lg:flex-row gap-6 items-stretch">
                    
                    {/* 左側：純實驗儀器觀測區 */}
                    <div className="w-full lg:w-1/2 flex flex-col">
                        <div className="bg-white rounded-xl shadow-lg p-6 flex flex-col border-t-8 border-indigo-500 h-full">
                            <div className="mb-4 border-b border-gray-200 pb-4 shrink-0">
                                <h1 className="text-2xl font-bold text-indigo-800 mb-2">🧪 酸鹼滴定實驗 <span className="text-sm bg-indigo-100 text-indigo-700 px-2 py-1 rounded ml-2">傳統探究版</span></h1>
                                <p className="text-gray-600 text-sm leading-relaxed">
                                    <strong>探究任務：</strong> 錐形瓶中有 <span className="text-red-600 font-bold">15mL</span> 的未知強酸。請透過右側中控台操作，觀察溶液變色來找出完全中和所需體積。<br/>
                                    <span className="text-orange-600 font-bold">⚠️ 挑戰：本儀器沒有 pH 探測功能，一切只能靠你的眼睛與判斷！</span>
                                </p>
                            </div>

                            {/* 放大的視覺動畫區 (加入固定高度舞台設計，解決過長問題) */}
                            <div className="w-full flex flex-col items-center justify-center flex-grow min-h-[440px] bg-gray-50/50 rounded-lg overflow-hidden border border-gray-100 py-6">
                                
                                {/* 內部固定高度小舞台，確保儀器之間的距離永遠不會被拉開 */}
                                <div className="relative w-48 h-[420px]">
                                    
                                    {/* 滴定管 */}
                                    <div className="absolute top-0 left-1/2 -translate-x-1/2 flex flex-col items-center z-20">
                                        <div className="w-8 h-48 border-2 border-gray-400 rounded-t-md bg-white/80 relative overflow-hidden flex items-end shadow-inner">
                                            <div className="absolute inset-0 flex flex-col justify-between py-1.5 pointer-events-none opacity-50">
                                                {[0,10,20,30,40,50].map(t => <div key={t} className="border-t border-gray-500 w-1/2"></div>)}
                                            </div>
                                            <div 
                                                className="w-full bg-blue-200 liquid-transition"
                                                style={{ height: `${((MAX_BURETTE_VOL - addedBase) / MAX_BURETTE_VOL) * 100}%` }}
                                            ></div>
                                        </div>
                                        <div className="w-2.5 h-4 bg-gray-600"></div>
                                        <div className="w-6 h-3 bg-gray-800 rounded-full shadow-md"></div>
                                    </div>

                                    {/* 水滴動畫起始點 */}
                                    <div className="absolute top-[215px] left-1/2 -translate-x-1/2 w-full z-30 pointer-events-none">
                                        {droplets.map(drop => (
                                            <div key={drop.id} className="teardrop animate-fall"></div>
                                        ))}
                                    </div>

                                    {/* 錐形瓶 */}
                                    <div className="absolute bottom-0 left-1/2 -translate-x-1/2 flex flex-col items-center z-10 w-40 h-40 drop-shadow-md">
                                        <div className="absolute inset-0 flask-clip flex items-end justify-center z-0 pb-[2px]">
                                            <div 
                                                className="w-full liquid-transition relative shadow-inner"
                                                style={{ 
                                                    height: `${Math.min(95, 15 + (addedBase / 50) * 80)}%`,
                                                    backgroundColor: currentColor
                                                }}
                                            >
                                                <div className="liquid-surface"></div>
                                            </div>
                                        </div>
                                        <svg viewBox="0 0 100 100" className="absolute inset-0 w-full h-full z-10 pointer-events-none" preserveAspectRatio="none">
                                            <path d="M40 5 L60 5 L60 30 L90 95 L10 95 L40 30 Z" fill="none" stroke="#4b5563" strokeWidth="3" strokeLinejoin="round" />
                                            <path d="M35 5 L65 5" stroke="#4b5563" strokeWidth="3" strokeLinecap="round" />
                                            <path d="M43 32 L20 85" stroke="rgba(255,255,255,0.4)" strokeWidth="2" strokeLinecap="round" />
                                        </svg>
                                    </div>

                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 右側：中控台與紀錄表 */}
                    <div className="w-full lg:w-1/2 flex flex-col gap-5 h-full">
                        
                        {/* 實驗操作面板 */}
                        <div className="bg-white rounded-xl shadow-lg p-5 flex flex-col border-t-8 border-blue-500 shrink-0">
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-lg font-bold text-gray-700">🎛️ 實驗操作面板</h2>
                                {showResetConfirm ? (
                                    <div className="flex items-center gap-2">
                                        <span className="text-xs text-red-600 font-bold">倒掉重來？</span>
                                        <button onClick={confirmReset} className="bg-red-500 text-white font-bold py-1 px-3 rounded shadow hover:bg-red-600 active:scale-95 transition-all text-xs">確定</button>
                                        <button onClick={() => setShowResetConfirm(false)} className="bg-gray-200 text-gray-700 font-bold py-1 px-3 rounded shadow hover:bg-gray-300 active:scale-95 transition-all text-xs">取消</button>
                                    </div>
                                ) : (
                                    <button onClick={() => setShowResetConfirm(true)} className="text-sm bg-gray-100 border border-gray-300 text-gray-600 font-bold py-1.5 px-3 rounded hover:bg-gray-200 active:scale-95 transition-all flex items-center gap-1">🔄 重新實驗</button>
                                )}
                            </div>

                            {/* 選擇器區塊 */}
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-5">
                                <div className="bg-blue-50 p-3 rounded-lg border border-blue-100 shadow-sm">
                                    <h3 className="font-bold text-blue-900 text-xs mb-2">🧪 選擇滴定管液體：</h3>
                                    <select 
                                        value={selectedTitrant}
                                        onChange={(e) => {
                                            setSelectedTitrant(e.target.value);
                                            InteractionLogger.log('SelectTitrant', { 
                                                titrantId: e.target.value, 
                                                titrantName: TITRANTS[e.target.value].name 
                                            });
                                        }}
                                        className="w-full p-2 border border-blue-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm bg-white font-medium text-blue-900 cursor-pointer shadow-sm"
                                    >
                                        {Object.entries(TITRANTS).map(([key, data]) => (
                                            <option key={key} value={key}>{data.name}</option>
                                        ))}
                                    </select>
                                </div>
                                <div className="bg-blue-50 p-3 rounded-lg border border-blue-100 shadow-sm">
                                    <h3 className="font-bold text-blue-900 text-xs mb-2">🎨 選擇瓶內指示劑：</h3>
                                    <select 
                                        value={selectedIndicator}
                                        onChange={handleIndicatorChange}
                                        disabled={addedBase > 0}
                                        className={`w-full p-2 border border-blue-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm font-medium shadow-sm transition-colors ${addedBase > 0 ? 'bg-gray-200 text-gray-500 cursor-not-allowed' : 'bg-white text-blue-900 cursor-pointer'}`}
                                    >
                                        {Object.entries(INDICATORS).map(([key, data]) => (
                                            <option key={key} value={key}>{data.name}</option>
                                        ))}
                                    </select>
                                    {/* 滴定開始後顯示警告提示 */}
                                    {addedBase > 0 && <div className="text-[10px] text-red-500 mt-1.5 font-bold">⚠️ 滴定中無法更換指示劑</div>}
                                </div>
                            </div>

                            {/* 滴定控制區塊 */}
                            <div className="border-t border-gray-200 pt-4">
                                <h3 className="font-bold text-gray-700 text-sm mb-3">控制滴定管閥門：</h3>
                                <div className="grid grid-cols-2 xl:grid-cols-4 gap-2">
                                    <button onClick={() => handleDrop(5.0)} className="bg-indigo-100 text-indigo-800 font-bold py-2 rounded shadow hover:bg-indigo-200 active:scale-95 transition-all text-sm">大量 +5 mL</button>
                                    <button onClick={() => handleDrop(1.0)} className="bg-indigo-400 text-white font-bold py-2 rounded shadow hover:bg-indigo-500 active:scale-95 transition-all text-sm">一般 +1 mL</button>
                                    <button onClick={() => handleDrop(0.1)} className="bg-indigo-500 text-white font-bold py-2 rounded shadow hover:bg-indigo-600 active:scale-95 transition-all text-sm">微調 +0.1 mL</button>
                                    <button onClick={() => handleDrop(0.05)} className="bg-indigo-700 text-white font-bold py-2 rounded shadow hover:bg-indigo-800 active:scale-95 transition-all text-sm shadow-[0_0_10px_rgba(67,56,202,0.4)]">💧 滴一滴</button>
                                </div>
                                {errorMsg && <div className="text-red-500 text-xs mt-3 font-bold text-center bg-red-50 p-2 rounded border border-red-200">{errorMsg}</div>}
                            </div>
                        </div>

                        {/* 自動數據紀錄表 (高度縮減，讓頁面不擁擠) */}
                        <div className="bg-white rounded-xl shadow-lg flex flex-col overflow-hidden border-t-8 border-gray-700 h-[380px] lg:h-[480px]">
                            <div className="bg-gray-700 text-white p-3 flex justify-between items-center shrink-0">
                                <h2 className="text-base font-bold flex items-center gap-2">📝 實驗步驟紀錄表</h2>
                                <span className="text-xs bg-gray-600 px-2.5 py-1 rounded text-gray-200 shadow-inner">依據滴加體積與顏色進行推斷</span>
                            </div>
                            
                            <div className="flex-grow flex flex-col p-4 bg-gray-50 overflow-hidden relative">
                                <div className="flex-grow border border-gray-300 rounded-lg overflow-y-auto bg-white shadow-inner mb-4">
                                    <table className="w-full text-left text-gray-600 whitespace-nowrap">
                                        <thead className="text-[11px] sm:text-xs text-gray-700 bg-gray-200 sticky top-0 border-b border-gray-300 z-10 shadow-sm">
                                            <tr>
                                                <th className="px-4 py-3">累積加入體積 (mL)</th>
                                                <th className="px-4 py-3">使用液體 / 指示劑</th>
                                                <th className="px-4 py-3">觀測溶液顏色</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {records.map((rec) => (
                                                <tr key={rec.id} className="border-b border-gray-100 hover:bg-indigo-50 text-xs sm:text-sm transition-colors">
                                                    <td className="px-4 py-3 font-mono font-bold text-indigo-600 text-base">{rec.addedV}</td>
                                                    <td className="px-4 py-3 text-gray-600 font-medium">{rec.titrantName} / {rec.indicatorName}</td>
                                                    <td className="px-4 py-3 font-bold text-gray-800">{rec.colorObv}</td>
                                                </tr>
                                            ))}
                                            <tr ref={recordsEndRef} />
                                        </tbody>
                                    </table>
                                </div>
                                
                                <div className="flex flex-col sm:flex-row sm:items-center gap-3 border-t border-gray-300 pt-3 shrink-0">
                                    <button 
                                        onClick={() => {
                                            setShowTotal(true);
                                            InteractionLogger.log('CheckTotalVolume', { finalVolume: addedBase });
                                        }} 
                                        className="bg-gray-800 hover:bg-black text-white font-bold py-2.5 px-6 rounded-lg shadow-md transition-transform active:scale-95 text-sm w-full sm:w-auto shrink-0"
                                    >
                                        ✅ 判斷已達終點並結算
                                    </button>
                                    
                                    {showTotal && (
                                        <div className="bg-yellow-100 border-2 border-yellow-400 text-yellow-800 px-4 py-2 rounded-lg text-sm font-bold flex-1 animate-pulse shadow-sm text-center sm:text-left">
                                            測量結果：總共消耗了 <span className="text-xl font-mono text-red-600 mx-1">{addedBase.toFixed(2)}</span> mL
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
