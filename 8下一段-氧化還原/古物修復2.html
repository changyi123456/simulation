<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>氧化還原探究 - 古畫修復篇</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* 沉浸式暗黑工坊背景 */
        body { margin: 0; padding: 0; background-color: #1c1917; background-image: radial-gradient(circle at 50% 50%, #292524 0%, #1c1917 100%); color: #e7e5e4; }
        
        .transition-all-slow { transition: all 1.5s ease-in-out; }
        .font-serif-tc { font-family: "Noto Serif TC", "PMingLiU", serif; }
        
        /* 羊皮紙質感 */
        .parchment {
            background-color: #e8dcb8;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
            color: #292524;
            box-shadow: inset 0 0 20px rgba(139, 69, 19, 0.3);
        }

        /* 噴霧水滴動畫 */
        @keyframes spray {
            0% { transform: translateY(-30px) scale(0.5); opacity: 0; }
            20% { transform: translateY(0px) scale(1); opacity: 0.9; }
            80% { transform: translateY(50px) scale(1.5); opacity: 0.8; }
            100% { transform: translateY(80px) scale(2); opacity: 0; }
        }
        .animate-spray { animation: spray 1.5s ease-out forwards; }

        /* 氣泡腐蝕動畫 */
        @keyframes bubbles {
            0% { transform: scale(0.8) translateY(0); opacity: 0; }
            50% { transform: scale(1.2) translateY(-10px); opacity: 1; }
            100% { transform: scale(1.5) translateY(-20px); opacity: 0; }
        }
        .animate-bubbles { animation: bubbles 1.5s ease-out forwards; }

        /* 黃銅質感按鈕 */
        .brass-btn {
            background: linear-gradient(to bottom, #78532c 0%, #52361b 100%);
            border: 1px solid #a1723c;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 4px 6px rgba(0,0,0,0.5);
            color: #fde68a;
        }
        .brass-btn:hover { background: linear-gradient(to bottom, #8a6236 0%, #634223 100%); }
        .brass-btn:disabled { background: #3f3f46; border-color: #27272a; color: #71717a; box-shadow: none; cursor: not-allowed; }
        
        .agent-card {
            background: rgba(30, 27, 24, 0.8);
            border: 1px solid #44403c;
            transition: all 0.2s;
        }
        .agent-card:hover:not(.disabled) {
            border-color: #d97706;
            background: rgba(69, 39, 16, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(217, 119, 6, 0.2);
        }
        .agent-card.selected {
            border-color: #fbbf24;
            background: rgba(120, 53, 15, 0.9);
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.3);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 1. Interaction Logger (數據追蹤工具)
        // ==========================================
        const STORAGE_KEY = "TaskInteractionData";
        let interactionHistory = [];

        const InteractionLogger = {
            init: function() {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try {
                        const parsed = JSON.parse(stored);
                        if (Array.isArray(parsed)) {
                            interactionHistory = parsed;
                        }
                    } catch (e) {
                        console.warn("Failed to parse existing interaction data", e);
                        interactionHistory = [];
                    }
                }
                // 更新識別碼為 Painting_Lab
                this.log('Initialize', { timestamp: new Date().toISOString(), sim: "Redox_Painting_Lab" });
            },

            log: function(action, details = {}) {
                const event = {
                    timestamp: new Date().toISOString(),
                    action: action,
                    details: details
                };
                interactionHistory.push(event);
                if (interactionHistory.length > 500) {
                    interactionHistory.shift();
                }
                localStorage.setItem(STORAGE_KEY, JSON.stringify(interactionHistory));
            },

            clear: function() {
                interactionHistory = [];
                localStorage.setItem(STORAGE_KEY, JSON.stringify([]));
            }
        };

        // ==========================================
        // 2. React 應用程式
        // ==========================================
        const { useState, useEffect, useRef } = React;

        const AGENTS = [
            { id: "water", name: "💧 純水", desc: "安定的中性液體。", category: "無關藥劑" },
            { id: "vinegar", name: "🍷 白醋", desc: "酸性調味液。", category: "無關藥劑" },
            { id: "baking_soda", name: "🫧 小蘇打水", desc: "弱鹼性清潔液。", category: "無關藥劑" },
            { id: "bleach", name: "☠️ 漂白水", desc: "極強的「氧化能力」。", category: "強氧化劑" },
            { id: "peroxide", name: "💥 雙氧水", desc: "具備「氧化破壞性」。", category: "強氧化劑" },
            { id: "vitC", name: "🍋 維他命C液", desc: "優良的「還原抗氧化」力。", category: "還原劑" },
            { id: "thiosulfate", name: "🧪 大蘇打水", desc: "常用於除去餘氯的藥劑。", category: "還原劑" }
        ];

        function App() {
            // 初始化 Logger
            useEffect(() => {
                InteractionLogger.init();
            }, []);

            const [selectedAgent, setSelectedAgent] = useState("water");
            const [isAnimating, setIsAnimating] = useState(false);
            const [animationEffect, setAnimationEffect] = useState(""); 
            const [paintingStatus, setPaintingStatus] = useState("default"); 
            const [records, setRecords] = useState([]);
            const recordsEndRef = useRef(null);

            const handleReset = () => {
                if(isAnimating) return;
                
                // 紀錄換新畫的事件
                InteractionLogger.log('ResetPainting');

                setPaintingStatus("default");
                setAnimationEffect("");
            };

            const handleSelectAgent = (agentId, agentName) => {
                setSelectedAgent(agentId);
                // 紀錄選擇試劑的事件
                InteractionLogger.log('SelectAgent', { agentId: agentId, agentName: agentName });
            };

            const handleAction = () => {
                if(isAnimating || paintingStatus !== "default") return;
                
                setIsAnimating(true);
                const agent = AGENTS.find(a => a.id === selectedAgent);
                
                // 紀錄開始分析的事件
                InteractionLogger.log('StartAnalysis', { agentId: agent.id, agentName: agent.name });

                setAnimationEffect("spray");
                
                setTimeout(() => {
                    let resultStatus = "default";
                    let logTitle = "";
                    let logMsg = "";
                    let isSuccess = false;

                    switch(selectedAgent) {
                        case "water":
                        case "vinegar":
                        case "baking_soda":
                            resultStatus = "default";
                            logTitle = "毫無反應 (能力不足)";
                            logMsg = "紫斑完全沒有褪色。這類藥劑既不具備還原能力，也無法破壞色素分子，屬於無關藥劑。";
                            isSuccess = false;
                            break;
                        case "bleach":
                            resultStatus = "destroyed";
                            logTitle = "破壞：氧化力太強";
                            logMsg = "紫斑雖然不見了，但此藥劑扮演了瘋狂的「電子強盜」，連畫作色彩也被它強行奪走並氧化破壞，整張畫全毀了！";
                            isSuccess = false;
                            break;
                        case "peroxide":
                            resultStatus = "ruined_holes";
                            setAnimationEffect("bubbles");
                            logTitle = "損毀：氧化腐蝕";
                            logMsg = "表面劇烈冒泡，發生了劇烈氧化反應！雖然除掉了紫斑，但也把脆弱的紙張纖維腐蝕出了大洞。";
                            isSuccess = false;
                            break;
                        case "vitC":
                            resultStatus = "restored";
                            logTitle = "完美修復 (還原作用)";
                            logMsg = "太神奇了！維他命C扮演了「電子捐贈者」，成功將紫斑分子還原成無色，且並未傷及底下的墨跡！";
                            isSuccess = true;
                            break;
                        case "thiosulfate":
                            resultStatus = "restored";
                            logTitle = "修復成功 (還原作用)";
                            logMsg = "噴灑後紫斑迅速褪色！大蘇打具備強大的還原力，能將強氧化性的紫斑中和，是另一種有效的修復藥劑。";
                            isSuccess = true;
                            break;
                    }

                    // 紀錄分析結果事件
                    InteractionLogger.log('AnalysisResult', { 
                        agentId: agent.id, 
                        result: resultStatus, 
                        success: isSuccess 
                    });

                    if (selectedAgent !== "peroxide") setAnimationEffect("");
                    setPaintingStatus(resultStatus);
                    setIsAnimating(false);
                    
                    setRecords(prev => [...prev, {
                        id: Date.now(),
                        agent: agent.name,
                        category: agent.category,
                        title: logTitle,
                        msg: logMsg,
                        success: isSuccess
                    }]);
                }, 1500); 
            };

            useEffect(() => {
                if (recordsEndRef.current) {
                    recordsEndRef.current.scrollIntoView({ behavior: "smooth" });
                }
            }, [records]);

            const renderPainting = () => {
                let canvasBg = "bg-[#fef3c7] border-[#92400e]"; 
                let inkOpacity = "opacity-100"; 
                let stainOpacity = "opacity-95"; 
                let holesEffect = null;

                if (paintingStatus === "restored") stainOpacity = "opacity-0";
                else if (paintingStatus === "destroyed") {
                    canvasBg = "bg-[#ffffff] border-[#d4d4d8]";
                    stainOpacity = "opacity-0";
                    inkOpacity = "opacity-5";
                } else if (paintingStatus === "ruined_holes") {
                    stainOpacity = "opacity-0"; 
                    inkOpacity = "opacity-60";
                    holesEffect = (
                        <div className="absolute inset-0 z-20 pointer-events-none opacity-80">
                            <div className="absolute top-1/4 left-1/4 w-8 h-6 bg-[#1c1917] rounded-full filter blur-[1px]"></div>
                            <div className="absolute top-1/2 right-1/3 w-12 h-10 bg-[#1c1917] rounded-[40%_60%_70%_30%] filter blur-[1px]"></div>
                            <div className="absolute bottom-1/4 left-1/3 w-6 h-8 bg-[#1c1917] rounded-full filter blur-[1px]"></div>
                        </div>
                    );
                }

                return (
                    <div className="relative w-48 h-72 flex flex-col items-center justify-center drop-shadow-[0_10px_20px_rgba(0,0,0,0.6)]">
                        {animationEffect === "spray" && (
                            <div className="absolute -top-8 w-full h-full flex justify-center z-40 pointer-events-none">
                                <span className="text-5xl animate-spray opacity-0">💦</span>
                            </div>
                        )}
                        {animationEffect === "bubbles" && (
                            <div className="absolute top-1/3 w-full flex justify-center z-40 pointer-events-none">
                                <span className="text-4xl animate-bubbles opacity-0">🫧</span>
                                <span className="text-3xl animate-bubbles opacity-0 delay-200 ml-4">🫧</span>
                            </div>
                        )}
                        <div className="w-56 h-4 bg-gradient-to-b from-[#78350f] to-[#451a03] rounded-sm z-10 shadow-lg flex justify-between items-center px-1 border border-[#292524]">
                            <div className="w-3 h-3 bg-[#b45309] rounded-full shadow-inner"></div>
                            <div className="w-3 h-3 bg-[#b45309] rounded-full shadow-inner"></div>
                        </div>
                        <div className={`w-full flex-grow border-x-4 flex items-center justify-center relative overflow-hidden transition-all-slow shadow-[inset_0_0_20px_rgba(0,0,0,0.1)] ${canvasBg}`}>
                            <div className={`absolute inset-0 flex flex-col items-center justify-center text-[#451a03] transition-all-slow ${inkOpacity}`}>
                                <svg width="120" height="150" viewBox="0 0 100 100" fill="currentColor" className="opacity-80 mix-blend-multiply">
                                    <path d="M10 80 Q 30 40 50 70 T 90 60 L 90 90 L 10 90 Z" />
                                    <path d="M30 90 Q 40 20 60 50 T 80 80 Z" opacity="0.6" />
                                    <circle cx="70" cy="30" r="8" opacity="0.4" />
                                </svg>
                                <div className="absolute bottom-4 left-4 font-serif-tc text-xs font-bold writing-vertical-rl opacity-70">秋山行旅圖</div>
                            </div>
                            <div className={`absolute top-1/3 left-1/4 w-28 h-28 bg-[#581c87] filter blur-xl rounded-full transition-all-slow duration-1000 mix-blend-multiply ${stainOpacity}`}></div>
                            <div className={`absolute bottom-1/3 right-1/4 w-16 h-16 bg-[#6b21a8] filter blur-lg rounded-full transition-all-slow duration-1000 mix-blend-multiply delay-100 ${stainOpacity}`}></div>
                            {holesEffect}
                        </div>
                        <div className="w-56 h-6 bg-gradient-to-b from-[#78350f] to-[#451a03] rounded-full z-10 shadow-lg flex justify-between items-center px-[-4px] border border-[#292524]">
                            <div className="w-5 h-5 bg-[#b45309] rounded-full shadow-inner -ml-2 border border-[#78350f]"></div>
                            <div className="w-5 h-5 bg-[#b45309] rounded-full shadow-inner -mr-2 border border-[#78350f]"></div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen p-4 sm:p-6 lg:p-8 flex flex-col lg:flex-row gap-8 items-stretch font-serif-tc selection:bg-amber-900 selection:text-amber-100">
                    <div className="w-full lg:w-1/2 flex flex-col">
                        <div className="bg-[#1e1c19] rounded-xl shadow-[0_0_40px_rgba(0,0,0,0.8)] flex flex-col border border-[#3f3f46] h-full overflow-hidden relative">
                            <div className="h-2 w-full bg-gradient-to-r from-[#78532c] via-[#b48a54] to-[#78532c]"></div>
                            <div className="p-5 sm:p-8 flex flex-col flex-grow relative z-10">
                                <div className="mb-6 flex items-center justify-between">
                                    <h1 className="text-3xl font-bold text-[#fbbf24] tracking-wider drop-shadow-md">👁️‍🗨️ 古畫修復台</h1>
                                    <div className="px-3 py-1 bg-[#292524] border border-[#44403c] rounded text-xs text-[#a8a29e] font-sans tracking-widest uppercase">Redox Quest</div>
                                </div>
                                <p className="text-[#d6d3d1] text-sm leading-loose mb-8 font-sans bg-[#292524]/60 p-4 rounded-lg border-l-4 border-[#b45309]">
                                    這幅畫沾染了<strong className="text-[#c084fc]">深紫色的強氧化劑</strong>分子。它非常「飢渴」，一直在尋找可以搶奪電子的目標。<br/>
                                    請從右側挑選試劑，嘗試在不傷害畫作的情況下，讓紫斑褪色回復無毒狀態。
                                </p>
                                <div className="flex-grow w-full flex flex-col items-center justify-center bg-gradient-to-b from-[#171717] to-[#0a0a0a] rounded-lg border border-[#292524] shadow-[inset_0_20px_50px_rgba(0,0,0,0.5)] relative min-h-[400px] py-10">
                                    {renderPainting()}
                                    <div className="absolute top-4 right-4 flex gap-2 font-sans font-bold z-50">
                                        {paintingStatus === "default" && <span className="bg-[#44403c] text-[#a8a29e] text-xs px-3 py-1.5 rounded-sm border border-[#57534e]">狀態：待分析</span>}
                                        {paintingStatus === "restored" && <span className="bg-[#064e3b] text-[#34d399] text-xs px-3 py-1.5 rounded-sm border border-[#059669] shadow-[0_0_10px_#059669] animate-pulse">✨ 還原成功</span>}
                                        {paintingStatus === "destroyed" && <span className="bg-[#7f1d1d] text-[#fca5a5] text-xs px-3 py-1.5 rounded-sm border border-[#b91c1c]">☠️ 氧化破壞</span>}
                                        {paintingStatus === "ruined_holes" && <span className="bg-[#451a03] text-[#f87171] text-xs px-3 py-1.5 rounded-sm border border-[#991b1b]">⚠️ 強氧化腐蝕</span>}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div className="w-full lg:w-1/2 flex flex-col gap-6 h-full">
                        <div className="bg-[#292524] rounded-xl shadow-[0_10px_30px_rgba(0,0,0,0.6)] p-5 sm:p-6 flex flex-col border border-[#44403c] shrink-0">
                            <div className="flex justify-between items-center mb-5 border-b border-[#44403c] pb-3">
                                <h2 className="text-xl font-bold text-[#e7e5e4]">🧪 分析試劑櫃</h2>
                                <button onClick={handleReset} disabled={isAnimating || paintingStatus === "default"} className={`text-xs font-bold py-1.5 px-3 rounded flex items-center gap-1 font-sans ${isAnimating || paintingStatus === "default" ? 'bg-[#1c1917] text-[#57534e] border border-[#292524] cursor-not-allowed' : 'bg-[#44403c] text-[#e7e5e4] border border-[#57534e] hover:bg-[#57534e] active:scale-95 transition-all'}`}>🔄 換一幅新畫</button>
                            </div>
                            <div className="mb-6 font-sans">
                                <h3 className="text-[#a8a29e] text-xs mb-3 font-bold tracking-widest uppercase">Classify the Agent :</h3>
                                <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                    {AGENTS.map(agent => (
                                        <button key={agent.id} onClick={() => handleSelectAgent(agent.id, agent.name)} disabled={paintingStatus !== "default" || isAnimating} className={`agent-card p-3 rounded text-left flex flex-col gap-1 ${(paintingStatus !== "default" || isAnimating) ? 'disabled opacity-40 cursor-not-allowed' : 'cursor-pointer'} ${selectedAgent === agent.id ? 'selected' : ''}`}>
                                            <span className="font-bold text-sm text-[#e7e5e4]">{agent.name}</span>
                                            <span className="text-[10px] text-[#a8a29e] leading-tight">{agent.desc}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <button onClick={handleAction} disabled={paintingStatus !== "default" || isAnimating} className={`w-full py-3.5 rounded font-bold tracking-widest text-lg font-sans transition-all ${paintingStatus !== "default" || isAnimating ? 'bg-[#3f3f46] text-[#71717a] cursor-not-allowed' : 'brass-btn active:scale-[0.98]'}`}>
                                {isAnimating ? "🧪 分析中..." : "💦 開始化學反應分析"}
                            </button>
                        </div>
                        <div className="parchment rounded-lg flex flex-col overflow-hidden border-4 border-[#78532c] flex-grow min-h-[350px]">
                            <div className="bg-[#78532c] text-[#fef3c7] p-3 shrink-0 flex justify-between items-center shadow-md">
                                <h2 className="text-lg font-bold flex items-center gap-2">📜 化學分類觀測手札</h2>
                            </div>
                            <div className="flex-grow p-5 sm:p-6 overflow-y-auto font-sans">
                                <div className="space-y-4">
                                    {records.length === 0 ? (
                                        <div className="text-center py-12 text-[#854d0e]/60 text-lg opacity-60 italic">觀察現象，判斷藥劑角色...</div>
                                    ) : (
                                        records.map((rec) => (
                                            <div key={rec.id} className="relative pb-4 border-b border-[#b48a54]/30 last:border-0">
                                                <div className="flex justify-between items-end mb-1.5">
                                                    <div>
                                                        <span className="font-bold text-[#78350f] text-base">{rec.agent}</span>
                                                        <span className="ml-2 text-[10px] bg-stone-700/10 px-1.5 py-0.5 rounded text-stone-600 font-bold tracking-tighter">歸類：{rec.category}</span>
                                                    </div>
                                                    <span className={`text-xs font-bold px-2 py-0.5 border-2 rounded-sm transform rotate-[-2deg] ${rec.success ? 'border-[#059669] text-[#059669]' : (rec.title.includes('反應') ? 'border-[#78716c] text-[#78716c]' : 'border-[#dc2626] text-[#dc2626]')}`}>
                                                        {rec.title}
                                                    </span>
                                                </div>
                                                <div className="text-sm text-[#451a03] leading-relaxed font-medium">{rec.msg}</div>
                                            </div>
                                        ))
                                    )}
                                    <div ref={recordsEndRef} />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
