<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酸鹼滴定實驗室 - 基礎篇</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f3f4f6; }
        .liquid-transition { transition: all 0.5s ease-in-out; }
        .flask-clip {
            clip-path: polygon(40% 5%, 60% 5%, 60% 30%, 90% 95%, 10% 95%, 40% 30%);
        }
        .teardrop {
            width: 10px;
            height: 14px;
            background-color: rgba(147, 197, 253, 0.8);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            position: absolute;
            transform: translateX(-50%);
            left: 50%;
        }
        @keyframes fall {
            0% { transform: translate(-50%, 0) scale(0.6); opacity: 1; }
            70% { opacity: 1; }
            100% { transform: translate(-50%, 90px) scale(0.9); opacity: 0; }
        }
        .animate-fall {
            animation: fall 0.35s cubic-bezier(0.4, 0, 0.6, 1) forwards;
        }
        .liquid-surface {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 100%);
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 1. Interaction Logger (數據追蹤工具)
        // ==========================================
        const STORAGE_KEY = "TaskInteractionData";
        let interactionHistory = [];

        const InteractionLogger = {
            init: function() {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try {
                        const parsed = JSON.parse(stored);
                        if (Array.isArray(parsed)) {
                            interactionHistory = parsed;
                        }
                    } catch (e) {
                        console.warn("Failed to parse existing interaction data", e);
                        interactionHistory = [];
                    }
                }
                // 更新識別碼為 AcidBase_Titration_Lab
                this.log('Initialize', { timestamp: new Date().toISOString(), sim: "AcidBase_Titration_Lab" });
            },

            log: function(action, details = {}) {
                const event = {
                    timestamp: new Date().toISOString(),
                    action: action,
                    details: details
                };
                interactionHistory.push(event);
                if (interactionHistory.length > 500) {
                    interactionHistory.shift();
                }
                localStorage.setItem(STORAGE_KEY, JSON.stringify(interactionHistory));
            },

            clear: function() {
                interactionHistory = [];
                localStorage.setItem(STORAGE_KEY, JSON.stringify([]));
            }
        };

        // ==========================================
        // 2. React 應用程式
        // ==========================================
        const { useState, useEffect, useRef } = React;

        // 實驗參數設定
        const ACID_VOL = 20.0;
        const ACID_M = 0.1;
        const MAX_BURETTE_VOL = 50.0;

        // 定義可選的鹼性液體 (包含名稱與每毫升提供的 OH- 莫耳濃度)
        const TITRANTS = {
            "NaOH_0.1": { name: "氫氧化鈉 (NaOH) 0.1M", ohConc: 0.1 },
            "KOH_0.05": { name: "氫氧化鉀 (KOH) 0.05M", ohConc: 0.05 },
            "CaOH2_0.1": { name: "氫氧化鈣 (Ca(OH)₂) 0.1M", ohConc: 0.2 } // 雙質子強鹼，OH- 濃度為 0.2M
        };

        // 計算 pH 值的真實化學公式 (基於累積的 OH- 莫耳數)
        const calculatePH = (addedVol, currentMolesOH) => {
            const molesH = ACID_M * ACID_VOL; // 2.0 mmol
            const totalVol = ACID_VOL + addedVol;

            if (Math.abs(molesH - currentMolesOH) < 0.0001) {
                return 7.0; 
            } else if (molesH > currentMolesOH) {
                const concH = (molesH - currentMolesOH) / totalVol;
                return -Math.log10(concH);
            } else {
                const concOH = (currentMolesOH - molesH) / totalVol;
                return 14 + Math.log10(concOH);
            }
        };

        const getIndicatorColor = (pH) => {
            if (pH < 8.2) return 'rgba(180, 215, 255, 0.35)';
            if (pH >= 10.0) return 'rgba(236, 72, 153, 0.85)';
            const opacity = 0.35 + ((pH - 8.2) / 1.8) * 0.5;
            return `rgba(236, 72, 153, ${opacity})`;
        };

        const getIndicatorColorName = (pH) => {
            if (pH < 8.2) return '透明無色';
            if (pH >= 10.0) return '深粉紅色';
            return '微透明粉紅';
        };

        function App() {
            // 初始化 Logger
            useEffect(() => {
                InteractionLogger.init();
            }, []);

            // 核心實驗狀態
            const [addedBase, setAddedBase] = useState(0.0); // 總滴加體積
            const [molesOH, setMolesOH] = useState(0.0); // 總累積的 OH- 莫耳數
            const [selectedTitrant, setSelectedTitrant] = useState("NaOH_0.1"); // 當前選擇的液體
            
            const [hiddenGraphData, setHiddenGraphData] = useState([{ v: 0, pH: calculatePH(0, 0) }]);
            const [displayGraphData, setDisplayGraphData] = useState([]);
            
            const [records, setRecords] = useState([{
                id: Date.now(),
                addedV: '0.00',
                currentPH: calculatePH(0, 0).toFixed(2),
                colorObv: '透明無色',
                titrantName: '-'
            }]);
            
            const [showResetConfirm, setShowResetConfirm] = useState(false);
            const [errorMsg, setErrorMsg] = useState("");
            const [showTotal, setShowTotal] = useState(false);
            const [droplets, setDroplets] = useState([]);

            const currentPH = calculatePH(addedBase, molesOH);
            const currentColor = getIndicatorColor(currentPH);
            
            const handleDrop = (amount) => {
                if (addedBase + amount > MAX_BURETTE_VOL) {
                    setErrorMsg("滴定管已經空了！請重新實驗。");
                    return;
                }

                // 計算本次滴加增加的 OH- 莫耳數
                const currentTitrantInfo = TITRANTS[selectedTitrant];
                const addedMolesOH = amount * currentTitrantInfo.ohConc;

                // 產生水滴動畫
                const dropCount = amount >= 1.0 ? 5 : (amount >= 0.1 ? 2 : 1);
                for (let i = 0; i < dropCount; i++) {
                    setTimeout(() => {
                        const dropId = Date.now() + Math.random();
                        setDroplets(prev => [...prev, { id: dropId }]);
                        setTimeout(() => {
                            setDroplets(prev => prev.filter(d => d.id !== dropId));
                        }, 350);
                    }, i * 80); 
                }

                const newVol = addedBase + amount;
                const newMolesOH = molesOH + addedMolesOH;
                const newPH = calculatePH(newVol, newMolesOH);
                
                // 紀錄滴加行為
                InteractionLogger.log('AddTitrant', { 
                    dropAmount: amount, 
                    totalVolume: newVol, 
                    currentPH: newPH,
                    titrantName: currentTitrantInfo.name
                });

                setAddedBase(newVol);
                setMolesOH(newMolesOH);
                setHiddenGraphData(prev => [...prev, { v: newVol, pH: newPH }]);
                
                // 自動記錄 (移除備註，加入使用的液體名稱)
                setRecords(prev => [...prev, {
                    id: Date.now(),
                    addedV: newVol.toFixed(2),
                    currentPH: newPH.toFixed(2),
                    colorObv: getIndicatorColorName(newPH),
                    titrantName: currentTitrantInfo.name.split(' ')[0] // 簡化名稱顯示
                }]);
                
                setErrorMsg("");
                setShowTotal(false);
            };

            const handleSyncGraph = () => {
                // 紀錄查看曲線行為
                InteractionLogger.log('SyncGraph', { dataPointsCount: hiddenGraphData.length });
                setDisplayGraphData([...hiddenGraphData]);
            };

            const confirmReset = () => {
                // 紀錄重新實驗行為
                InteractionLogger.log('ResetExperiment');

                setAddedBase(0.0);
                setMolesOH(0.0);
                const initialPH = calculatePH(0, 0);
                setHiddenGraphData([{ v: 0, pH: initialPH }]);
                setDisplayGraphData([]); 
                setRecords([{
                    id: Date.now(),
                    addedV: '0.00',
                    currentPH: initialPH.toFixed(2),
                    colorObv: '透明無色',
                    titrantName: '-'
                }]);
                setShowResetConfirm(false);
                setErrorMsg("");
                setShowTotal(false);
            };

            const generatePath = () => {
                if (displayGraphData.length === 0) return "";
                return displayGraphData.map((pt, i) => {
                    const x = (pt.v / 50) * 100; // 圖表 X 軸延伸到 50mL
                    const y = 100 - ((pt.pH / 14) * 100);
                    return `${i === 0 ? 'M' : 'L'} ${x} ${y}`;
                }).join(" ");
            };

            const recordsEndRef = useRef(null);
            useEffect(() => {
                if (recordsEndRef.current) {
                    recordsEndRef.current.scrollIntoView({ behavior: "smooth" });
                }
            }, [records]);

            return (
                <div className="min-h-screen p-4 sm:p-6 font-sans text-gray-800 flex flex-col lg:flex-row gap-6">
                    {/* 左側：實驗儀器操作區 */}
                    <div className="w-full lg:w-5/12 xl:w-1/3 flex flex-col gap-6">
                        <div className="bg-white rounded-xl shadow-lg p-6 flex flex-col border-t-8 border-pink-500 flex-grow">
                            <div className="mb-4 border-b border-gray-200 pb-4">
                                <h1 className="text-2xl font-bold text-pink-800 mb-2">🧪 酸鹼滴定實驗</h1>
                                <p className="text-gray-600 text-sm mb-2 leading-relaxed">
                                    <strong>探究任務：</strong> 錐形瓶中有 20mL 未知強酸。請滴加鹼性液體找出完全中和體積。<br/>
                                </p>
                            </div>

                            {/* 滴定液選擇器 */}
                            <div className="bg-blue-50 p-3 rounded-lg border border-blue-100 mb-4 shadow-sm">
                                <h3 className="font-bold text-blue-800 text-sm mb-2">🧪 選擇滴定管液體：</h3>
                                <select 
                                    value={selectedTitrant}
                                    onChange={(e) => {
                                        setSelectedTitrant(e.target.value);
                                        InteractionLogger.log('SelectTitrant', { 
                                            titrantId: e.target.value, 
                                            titrantName: TITRANTS[e.target.value].name 
                                        });
                                    }}
                                    className="w-full p-2 border border-blue-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm bg-white font-medium text-blue-900 cursor-pointer shadow-sm"
                                >
                                    {Object.entries(TITRANTS).map(([key, data]) => (
                                        <option key={key} value={key}>{data.name}</option>
                                    ))}
                                </select>
                            </div>

                            {/* 操作按鈕 */}
                            <div className="space-y-3">
                                <h3 className="font-bold text-gray-700 text-sm">控制滴定管閥門：</h3>
                                <div className="flex gap-2">
                                    <button onClick={() => handleDrop(5.0)} className="flex-1 bg-blue-100 text-blue-800 font-bold py-2 rounded shadow hover:bg-blue-200 active:scale-95 transition-all text-sm">大量 +5 mL</button>
                                    <button onClick={() => handleDrop(1.0)} className="flex-1 bg-blue-400 text-white font-bold py-2 rounded shadow hover:bg-blue-500 active:scale-95 transition-all text-sm">一般 +1 mL</button>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => handleDrop(0.1)} className="flex-1 bg-pink-400 text-white font-bold py-2 rounded shadow hover:bg-pink-500 active:scale-95 transition-all text-sm">微調 +0.1 mL</button>
                                    <button onClick={() => handleDrop(0.05)} className="flex-1 bg-pink-600 text-white font-bold py-2 rounded shadow hover:bg-pink-700 active:scale-95 transition-all text-sm">💧 滴一滴 (+0.05mL)</button>
                                </div>
                                
                                {errorMsg && <div className="text-red-500 text-xs mt-2 font-bold text-center bg-red-50 p-2 rounded">{errorMsg}</div>}

                                {showResetConfirm ? (
                                    <div className="w-full mt-2 p-2 border-2 border-red-200 bg-red-50 rounded flex flex-col items-center gap-2 transition-all">
                                        <span className="text-sm text-red-600 font-bold">確定要倒掉重來嗎？圖表將清除！</span>
                                        <div className="flex gap-2 w-full">
                                            <button onClick={confirmReset} className="flex-1 bg-red-500 text-white font-bold py-1 rounded shadow hover:bg-red-600 active:scale-95 transition-all text-sm">確定</button>
                                            <button onClick={() => setShowResetConfirm(false)} className="flex-1 bg-gray-300 text-gray-700 font-bold py-1 rounded shadow hover:bg-gray-400 active:scale-95 transition-all text-sm">取消</button>
                                        </div>
                                    </div>
                                ) : (
                                    <button onClick={() => setShowResetConfirm(true)} className="w-full mt-2 border-2 border-gray-300 text-gray-500 font-bold py-1 rounded hover:bg-gray-100 active:scale-95 transition-all text-sm">🔄 重新實驗</button>
                                )}
                            </div>

                            {/* 視覺動畫區 */}
                            <div className="w-full flex flex-col items-center relative h-[380px] flex-grow pt-4">
                                {/* 滴定管 */}
                                <div className="absolute top-0 flex flex-col items-center z-20">
                                    <div className="w-6 h-48 border-2 border-gray-400 rounded-t-md bg-white/80 relative overflow-hidden flex items-end shadow-inner">
                                        {/* 刻度 */}
                                        <div className="absolute inset-0 flex flex-col justify-between py-1 pointer-events-none opacity-50">
                                            {[0,10,20,30,40,50].map(t => <div key={t} className="border-t border-gray-500 w-1/2"></div>)}
                                        </div>
                                        {/* 滴定管內液體 (統一呈現水質感) */}
                                        <div 
                                            className="w-full bg-blue-200 liquid-transition"
                                            style={{ height: `${((MAX_BURETTE_VOL - addedBase) / MAX_BURETTE_VOL) * 100}%` }}
                                        ></div>
                                    </div>
                                    {/* 閥門頭 */}
                                    <div className="w-2 h-4 bg-gray-600"></div>
                                    <div className="w-5 h-2.5 bg-gray-800 rounded-full shadow-md"></div>
                                </div>

                                {/* 真實掉落水滴容器 */}
                                <div className="absolute top-[210px] w-full z-30 pointer-events-none">
                                    {droplets.map(drop => (
                                        <div key={drop.id} className="teardrop animate-fall"></div>
                                    ))}
                                </div>

                                {/* 錐形瓶 */}
                                <div className="absolute bottom-12 flex flex-col items-center z-10 w-36 h-36">
                                    <div className="absolute inset-0 flask-clip flex items-end justify-center z-0 pb-[3px]">
                                        <div 
                                            className="w-full liquid-transition relative shadow-inner"
                                            style={{ 
                                                height: `${Math.min(95, 20 + (addedBase / 50) * 75)}%`,
                                                backgroundColor: currentColor
                                            }}
                                        >
                                            <div className="liquid-surface"></div>
                                        </div>
                                    </div>
                                    <svg viewBox="0 0 100 100" className="absolute inset-0 w-full h-full z-10 pointer-events-none" preserveAspectRatio="none">
                                        <path d="M40 5 L60 5 L60 30 L90 95 L10 95 L40 30 Z" fill="none" stroke="#4b5563" strokeWidth="2.5" strokeLinejoin="round" />
                                        <path d="M35 5 L65 5" stroke="#4b5563" strokeWidth="2.5" strokeLinecap="round" />
                                        <path d="M43 32 L20 85" stroke="rgba(255,255,255,0.4)" strokeWidth="2" strokeLinecap="round" />
                                    </svg>
                                </div>
                                <div className="absolute bottom-0 mt-2 bg-gray-800 text-white font-mono px-5 py-2 rounded-full shadow-lg text-lg flex items-center gap-2 z-20">
                                    <span className="text-xs text-gray-300">pH 探測儀</span> {currentPH.toFixed(2)}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 右側：滴定曲線與數據紀錄區 */}
                    <div className="w-full lg:w-7/12 xl:w-2/3 flex flex-col gap-6">
                        
                        {/* 數據紀錄區 */}
                        <div className="bg-white rounded-xl shadow-lg flex flex-col overflow-hidden border-t-8 border-gray-700 h-72">
                            <div className="bg-gray-700 text-white p-3 flex justify-between items-center">
                                <h2 className="text-lg font-bold flex items-center gap-2">📝 自動紀錄表</h2>
                            </div>
                            
                            <div className="flex-grow flex flex-col p-4 bg-gray-50 overflow-hidden relative">
                                <div className="flex-grow border border-gray-300 rounded-lg overflow-y-auto bg-white shadow-inner mb-4">
                                    <table className="w-full text-left text-gray-600 whitespace-nowrap">
                                        <thead className="text-[10px] sm:text-xs text-gray-700 bg-gray-200 sticky top-0 border-b border-gray-300 z-10">
                                            <tr>
                                                <th className="px-3 py-2">累積加入量 (mL)</th>
                                                <th className="px-3 py-2">本次滴加液體</th>
                                                <th className="px-3 py-2">目前 pH 值</th>
                                                <th className="px-3 py-2">觀測溶液顏色</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {records.map((rec) => (
                                                <tr key={rec.id} className="border-b border-gray-100 hover:bg-gray-50 text-xs sm:text-sm transition-colors">
                                                    <td className="px-3 py-2 font-mono font-bold text-blue-600">{rec.addedV}</td>
                                                    <td className="px-3 py-2 text-gray-500 font-bold">{rec.titrantName}</td>
                                                    <td className="px-3 py-2 font-mono font-bold text-pink-600">{rec.currentPH}</td>
                                                    <td className="px-3 py-2 font-medium">{rec.colorObv}</td>
                                                </tr>
                                            ))}
                                            <tr ref={recordsEndRef} />
                                        </tbody>
                                    </table>
                                </div>
                                
                                {/* 結算區塊 */}
                                <div className="flex items-center gap-4 border-t border-gray-300 pt-3">
                                    <button 
                                        onClick={() => {
                                            setShowTotal(true);
                                            InteractionLogger.log('CheckTotalVolume', { finalVolume: addedBase });
                                        }} 
                                        className="bg-gray-800 hover:bg-black text-white font-bold py-2 px-6 rounded shadow-md transition-transform active:scale-95 text-sm"
                                    >
                                        結算總加入量
                                    </button>
                                    
                                    {showTotal && (
                                        <div className="bg-yellow-100 border border-yellow-400 text-yellow-800 px-4 py-2 rounded text-sm font-bold flex-1 animate-pulse">
                                            結果判定：總共消耗了 <span className="text-lg font-mono text-red-600 mx-1">{addedBase.toFixed(2)}</span> mL 的體積
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* 即時 pH 紀錄儀 (圖表) */}
                        <div className="bg-white rounded-xl shadow-lg p-6 border-t-8 border-blue-500 flex-grow flex flex-col">
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-lg font-bold text-gray-700 flex items-center gap-2">📊 滴定曲線圖表</h2>
                                <button 
                                    onClick={handleSyncGraph} 
                                    className="bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold py-1.5 px-4 rounded shadow transition-all active:scale-95 flex items-center gap-2"
                                >
                                    🔄 顯示 / 同步數據曲線
                                </button>
                            </div>
                            
                            <div className="relative w-full flex-grow min-h-[200px] bg-gray-50 border border-gray-300 rounded overflow-hidden">
                                {displayGraphData.length === 0 && (
                                    <div className="absolute inset-0 flex items-center justify-center bg-white/80 z-20 backdrop-blur-sm">
                                        <div className="text-gray-500 font-bold flex flex-col items-center">
                                            <span className="text-2xl mb-2">📈</span>
                                            請點擊右上角「同步數據」以繪製曲線
                                        </div>
                                    </div>
                                )}

                                <div className="absolute inset-0 grid grid-cols-10 grid-rows-7 opacity-20 pointer-events-none">
                                    {[...Array(70)].map((_, i) => <div key={i} className="border-t border-l border-gray-400"></div>)}
                                </div>
                                <div className="absolute left-1 top-0 text-[10px] text-gray-500 bg-white/50 px-1 rounded-br">pH 14</div>
                                <div className="absolute left-1 bottom-1 text-[10px] text-gray-500 bg-white/50 px-1 rounded-tr">pH 0</div>
                                <div className="absolute right-1 bottom-1 text-[10px] text-gray-500 bg-white/50 px-1 rounded-tl">50 mL</div>
                                
                                <div className="absolute w-full bg-pink-100/50 pointer-events-none border-y border-pink-200" style={{ top: `${100 - (10/14)*100}%`, height: `${(1.8/14)*100}%` }}>
                                    <span className="text-[10px] text-pink-500 ml-10 font-bold">酚酞變色區間 (pH 8.2~10)</span>
                                </div>

                                <svg className="w-full h-full overflow-visible" preserveAspectRatio="none">
                                    {displayGraphData.length > 0 && (
                                        <>
                                            <path 
                                                d={generatePath()} 
                                                fill="none" 
                                                stroke="#ec4899" 
                                                strokeWidth="3" 
                                                strokeLinecap="round" 
                                                strokeLinejoin="round"
                                                className="drop-shadow-sm"
                                            />
                                            {displayGraphData.map((pt, i) => (
                                                <circle 
                                                    key={i} 
                                                    cx={`${(pt.v / 50) * 100}%`} 
                                                    cy={`${100 - ((pt.pH / 14) * 100)}%`} 
                                                    r="3" 
                                                    fill="#be185d" 
                                                />
                                            ))}
                                        </>
                                    )}
                                </svg>
                            </div>
                            <div className="text-center text-xs text-gray-500 mt-2 font-medium">橫軸：加入鹼性液體總體積 (0~50mL) │ 縱軸：溶液 pH 值 (0~14)</div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
