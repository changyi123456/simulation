<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高拟真坐骨神经-腓肠肌收缩分析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc; 
            overflow: hidden; /* 强制不滚动 */
        }
        
        /* 示波器画布样式 */
        #oscilloscope-container {
            background-color: #020617;
            background-image: 
                linear-gradient(rgba(16, 185, 129, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(16, 185, 129, 0.15) 1px, transparent 1px);
            background-size: 20px 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        /* 滑杆样式 */
        input[type=range] {
            -webkit-appearance: none; 
            background: #475569; 
            height: 6px; 
            border-radius: 3px;
            outline: none;
            width: 100%;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #38bdf8;
            cursor: pointer;
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); background: #7dd3fc; }
        
        /* 警示动画 */
        @keyframes flashRed {
            0% { color: #f59e0b; }
            50% { color: #ef4444; }
            100% { color: #f59e0b; }
        }
        .alert-flash { animation: flashRed 1s infinite; }

        /* 滴水动画 */
        @keyframes dropWater {
            0% { top: 0; opacity: 1; transform: scale(1); }
            100% { top: 40px; opacity: 0; transform: scale(1.5); }
        }
        .water-drop-anim { animation: dropWater 0.5s ease-in forwards; }
        
        .panel { background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; }
    </style>
</head>
<body class="h-screen w-screen p-2 flex flex-col box-border">

    <!-- 顶部标题 -->
    <header class="h-12 shrink-0 flex justify-between items-center px-4 panel mb-2 bg-slate-800">
        <h1 class="text-xl font-bold text-sky-400 flex items-center">
            <span class="mr-2">🐸</span> 高拟真 MedLab 骨骼肌收缩分析仪
        </h1>
        <div class="flex items-center gap-4">
            <div class="text-xs font-mono text-emerald-400 border border-emerald-900 bg-emerald-900/20 px-2 py-1 rounded">
                STATUS: ONLINE
            </div>
            <button onclick="resetLab()" class="text-xs text-slate-400 hover:text-white underline">
                ↺ 更换新标本
            </button>
        </div>
    </header>

    <!-- 主要内容区 (满版排列) -->
    <main class="flex-1 min-h-0 flex flex-col lg:flex-row gap-2">
        
        <!-- 左侧：示波器与实时反馈 -->
        <section class="flex-1 flex flex-col gap-2 min-w-0">
            
            <!-- 示波器面板 -->
            <div class="panel flex-1 flex flex-col overflow-hidden relative">
                <!-- 示波器信息列 -->
                <div class="h-8 shrink-0 flex justify-between items-center px-3 border-b border-slate-700 bg-slate-800/50 text-xs font-mono text-slate-400">
                    <div class="flex gap-4">
                        <span class="text-sky-400">CH1: 张力 (Tension)</span>
                        <span>Sweep: 10ms/div</span>
                    </div>
                    <div id="lab-timer" class="text-amber-400">Time: 0.00s</div>
                </div>
                
                <!-- 画布容器 -->
                <div id="oscilloscope-container" class="flex-1 relative w-full h-full">
                    <canvas id="oscilloscope" class="absolute top-0 left-0 w-full h-full"></canvas>
                </div>

                <!-- 实时读数 (悬浮在示波器上方) -->
                <div class="absolute top-10 right-4 flex gap-2 text-center opacity-80 pointer-events-none">
                    <div class="bg-slate-900/80 rounded px-3 py-1 border border-slate-700">
                        <div class="text-[10px] text-slate-400">当前刺激</div>
                        <div id="disp-intensity" class="text-base font-bold font-mono text-sky-400">0.0 V</div>
                    </div>
                    <div class="bg-slate-900/80 rounded px-3 py-1 border border-slate-700">
                        <div class="text-[10px] text-slate-400">当前张力</div>
                        <div id="disp-tension" class="text-base font-bold font-mono text-emerald-400">0.0 g</div>
                    </div>
                </div>
            </div>

            <!-- 理论反馈区 -->
            <div class="panel h-32 shrink-0 p-3 overflow-y-auto">
                <h3 class="text-xs font-bold text-slate-400 mb-2 border-b border-slate-700 pb-1 flex items-center">
                    <span class="mr-2">📊</span> 生理状态实时分析
                </h3>
                <div id="theory-feedback" class="text-sm text-slate-300 leading-relaxed">
                    请调整右侧参数给予刺激，系统将自动分析当前的收缩曲线特征与标本健康状况。
                </div>
            </div>
        </section>

        <!-- 右侧：控件与肌肉标本 (固定宽度) -->
        <aside class="w-full lg:w-[320px] shrink-0 flex flex-col gap-2 overflow-y-auto">
            
            <!-- 仿真肌肉样本展示 -->
            <div class="panel h-40 shrink-0 relative overflow-hidden flex flex-col items-center justify-center bg-slate-900">
                <span class="absolute top-2 left-2 text-[10px] text-slate-500 font-bold tracking-wider">离体腓肠肌标本</span>
                
                <div class="relative w-full h-24 flex items-center justify-center mt-2">
                    <!-- 骨架与固定夹 -->
                    <div class="absolute left-6 w-3 h-16 bg-slate-600 rounded border border-slate-500 z-20"></div>
                    <div class="absolute right-6 w-3 h-16 bg-slate-600 rounded border border-slate-500 z-20"></div>
                    
                    <!-- 肌腱 (白色/浅灰色) -->
                    <div class="absolute left-8 w-10 h-2 bg-slate-300 z-10"></div>
                    <div class="absolute right-8 w-10 h-2 bg-slate-300 z-10"></div>
                    
                    <!-- 肌肉本体 (红色，随张力变形) -->
                    <div id="muscle-belly" class="w-36 h-12 bg-red-600 rounded-[50%] border-4 border-red-800 flex items-center justify-center shadow-[inset_0_0_15px_rgba(0,0,0,0.6)] z-30 transition-transform" style="transform-origin: center;">
                        <!-- 肌肉纹理 -->
                        <div class="w-3/4 h-1/2 border-t border-b border-red-500/50 rounded-[50%]"></div>
                    </div>

                    <!-- 滴水特效锚点 -->
                    <div id="water-drop-anchor" class="absolute top-0 text-sky-300 opacity-0 z-40">💧</div>
                </div>
            </div>
            
            <!-- 刺激器控制面板 -->
            <div class="panel flex-1 min-h-0 flex flex-col p-4 bg-slate-800">
                <h3 class="font-bold text-sky-400 mb-4 flex items-center text-sm border-b border-slate-700 pb-2">
                    <span class="mr-2">⚡</span> 电子刺激器 (Stimulator)
                </h3>

                <!-- 强度 (Voltage) -->
                <div class="mb-5">
                    <div class="flex justify-between mb-1">
                        <label class="text-xs font-bold text-slate-400">刺激强度 (V)</label>
                        <span id="val-intensity" class="text-sky-400 font-mono text-sm">0.0 V</span>
                    </div>
                    <input type="range" id="slider-intensity" min="0" max="10" step="0.1" value="0" oninput="updateMedLabUI()">
                    <div class="flex justify-between text-[10px] text-slate-500 mt-1 font-mono">
                        <span>0V</span>
                        <span id="label-threshold" class="text-amber-500">预估阈值: 2.0V</span>
                        <span>10V</span>
                    </div>
                </div>

                <!-- 频率 (Hz) -->
                <div class="mb-6">
                    <div class="flex justify-between mb-1">
                        <label class="text-xs font-bold text-slate-400">刺激频率 (Hz)</label>
                        <span id="val-frequency" class="text-purple-400 font-mono text-sm">1 Hz</span>
                    </div>
                    <input type="range" id="slider-frequency" min="1" max="60" step="1" value="1" oninput="updateMedLabUI()">
                    <div class="flex justify-between text-[10px] text-slate-500 mt-1">
                        <span>单收缩</span>
                        <span>完全强直</span>
                    </div>
                </div>

                <div class="flex-1"></div> <!-- 占位推到底部 -->

                <!-- 触发按钮 -->
                <div class="grid grid-cols-2 gap-2 mt-4 shrink-0">
                    <button onmousedown="triggerSingle()" class="bg-slate-700 hover:bg-sky-600 text-slate-200 hover:text-white py-2 rounded text-sm font-bold transition-colors border border-slate-600 hover:border-sky-500">
                        单次刺激
                    </button>
                    <button id="btn-continuous" onclick="toggleContinuous()" class="bg-purple-600 hover:bg-purple-500 text-white py-2 rounded text-sm font-bold shadow-[0_0_10px_rgba(147,51,234,0.3)] transition-colors border border-purple-500">
                        连续刺激
                    </button>
                </div>
            </div>

            <!-- 环境变因 (组织湿润度) -->
            <div class="panel h-28 shrink-0 p-4 relative overflow-hidden bg-slate-800">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="font-bold text-rose-400 text-sm flex items-center">
                        <span class="mr-2">🦠</span> 环境变因控制
                    </h3>
                    <button onclick="addRinger()" class="bg-sky-900/50 hover:bg-sky-600 text-sky-200 hover:text-white text-[10px] px-2 py-1 rounded border border-sky-700 transition-colors">
                        💧 滴加任氏液
                    </button>
                </div>
                
                <!-- 标本湿润度 -->
                <div>
                    <div class="flex justify-between text-xs mb-1 font-bold">
                        <span class="text-slate-400">组织湿润度</span>
                        <span id="moisture-text" class="text-sky-400 font-mono">100%</span>
                    </div>
                    <div class="w-full bg-slate-900 rounded-full h-2 border border-slate-700">
                        <div id="moisture-bar" class="bg-sky-500 h-full rounded-full transition-all" style="width: 100%"></div>
                    </div>
                    <p class="text-[10px] text-slate-500 mt-1">※ 随着水分蒸发干燥，神经阈值将会升高。</p>
                </div>
            </div>

        </aside>
    </main>

    <!-- 核心 JavaScript 逻辑 -->
    <script>
        // ==================== 物理与生理模型状态 ====================
        let labState = {
            time: 0,
            isContinuous: false,
            lastContStimTime: 0,
            
            // 组织健康状态
            moisture: 100.0,       // 100% ~ 0%

            // 基准生理参数 (健康状态下)
            baseThreshold: 2.0,    // 阈值电压
            baseMaxV: 6.0,         // 最大收缩所需电压
            baseTau: 40,           // 收缩时间常数(ms)，决定波形宽度
            baseMaxTension: 1.0,   // 基础最大张力乘数
            
            // 实时计算出的生理参数
            currentThreshold: 2.0,
            
            twitches: [] // 储存刺激事件 {startTime, amplitude, tau}
        };

        const canvas = document.getElementById('oscilloscope');
        const ctx = canvas.getContext('2d');
        let historyData = [];

        // ==================== UI 与画布重置逻辑 ====================
        function resizeCanvas() {
            const container = document.getElementById('oscilloscope-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            
            // 调整历史数据长度以匹配画布宽度
            if (historyData.length < canvas.width) {
                const padding = new Array(canvas.width - historyData.length).fill(0);
                historyData = padding.concat(historyData);
            } else if (historyData.length > canvas.width) {
                historyData = historyData.slice(historyData.length - canvas.width);
            }
        }
        window.addEventListener('resize', resizeCanvas);

        function updateMedLabUI() {
            const intensity = parseFloat(document.getElementById('slider-intensity').value).toFixed(1);
            const frequency = document.getElementById('slider-frequency').value;
            
            document.getElementById('val-intensity').innerText = intensity + ' V';
            document.getElementById('val-frequency').innerText = frequency + ' Hz';
            document.getElementById('disp-intensity').innerText = intensity + ' V';

            analyzeTheoryFeedback(parseFloat(intensity), parseInt(frequency));
        }

        function toggleContinuous() {
            labState.isContinuous = !labState.isContinuous;
            const btn = document.getElementById('btn-continuous');
            if (labState.isContinuous) {
                btn.innerText = "停止刺激";
                btn.className = "bg-rose-600 hover:bg-rose-500 text-white py-2 rounded text-sm font-bold shadow-[0_0_15px_rgba(225,29,72,0.4)] transition-colors border border-rose-400";
                labState.lastContStimTime = labState.time; 
            } else {
                btn.innerText = "连续刺激";
                btn.className = "bg-purple-600 hover:bg-purple-500 text-white py-2 rounded text-sm font-bold shadow-[0_0_10px_rgba(147,51,234,0.3)] transition-colors border border-purple-500";
            }
            updateMedLabUI();
        }

        function triggerSingle() {
            const intensity = parseFloat(document.getElementById('slider-intensity').value);
            addStimulus(intensity);
        }

        // ==================== 核心生理学事件触发 ====================
        function addStimulus(intensity) {
            // 1. 根据组织健康状态重新计算阈值 (干燥导致阈值升高)
            labState.currentThreshold = labState.baseThreshold + ((100 - labState.moisture) / 100) * 4.0;
            
            // 更新 UI 显示预估阈值
            const labelThreshold = document.getElementById('label-threshold');
            labelThreshold.innerText = `预估阈值: ${labState.currentThreshold.toFixed(1)}V`;
            if(labState.currentThreshold > 5.0) labelThreshold.className = "text-rose-500 font-bold alert-flash";
            else labelThreshold.className = "text-amber-500";

            let currentMaxV = labState.baseMaxV + (labState.currentThreshold - labState.baseThreshold);
            let rawAmplitude = 0;
            
            // 判断是否引发动作电位
            if (intensity < labState.currentThreshold) {
                rawAmplitude = 0; // 阈下刺激
            } else if (intensity >= labState.currentThreshold && intensity < currentMaxV) {
                // 次最大刺激 (空间总和)
                rawAmplitude = 0.2 + 0.8 * ((intensity - labState.currentThreshold) / (currentMaxV - labState.currentThreshold));
            } else {
                // 最大刺激
                rawAmplitude = 1.0; 
            }

            if (rawAmplitude > 0) {
                // 加入干燥衰减因子
                let healthFactor = (labState.moisture / 100.0);
                let finalAmplitude = rawAmplitude * labState.baseMaxTension * healthFactor;

                // 加入事件队列
                labState.twitches.push({
                    startTime: labState.time,
                    amplitude: finalAmplitude,
                    tau: labState.baseTau
                });
            }
        }

        // ==================== 环境变因控制 ====================
        function addRinger() {
            labState.moisture = 100;
            updateStatusUI();
            
            // 触发滴水动画
            const drop = document.getElementById('water-drop-anchor');
            drop.classList.remove('water-drop-anim');
            void drop.offsetWidth; // trigger reflow
            drop.classList.add('water-drop-anim');
        }

        function resetLab() {
            labState = { time: 0, isContinuous: false, lastContStimTime: 0, moisture: 100, baseThreshold: 2.0, baseMaxV: 6.0, baseTau: 40, baseMaxTension: 1.0, currentThreshold: 2.0, twitches: [] };
            
            const btnCont = document.getElementById('btn-continuous');
            btnCont.innerText = "连续刺激";
            btnCont.className = "bg-purple-600 hover:bg-purple-500 text-white py-2 rounded text-sm font-bold shadow-[0_0_10px_rgba(147,51,234,0.3)] transition-colors border border-purple-500";
            
            historyData.fill(0);
            updateStatusUI();
            updateMedLabUI();
        }

        function updateStatusUI() {
            // 湿润度 UI
            const mBar = document.getElementById('moisture-bar');
            const mText = document.getElementById('moisture-text');
            mBar.style.width = labState.moisture + '%';
            mText.innerText = Math.round(labState.moisture) + '%';
            if(labState.moisture < 30) { mBar.className = "bg-rose-500 h-full rounded-full transition-all"; mText.className = "text-rose-400 font-mono alert-flash"; }
            else if(labState.moisture < 70) { mBar.className = "bg-amber-500 h-full rounded-full transition-all"; mText.className = "text-amber-400 font-mono"; }
            else { mBar.className = "bg-sky-500 h-full rounded-full transition-all"; mText.className = "text-sky-400 font-mono"; }
        }

        // 理论与生理反馈文字更新
        function analyzeTheoryFeedback(intensity, freq) {
            let fb = "";
            
            // 1. 检查健康状态
            if (labState.moisture < 40) {
                fb += `<div class="text-amber-400 mb-2"><b>[病理] 组织严重干燥：</b>缺乏液体环境导致细胞膜离子(Na+/K+)浓度梯度失衡，兴奋性下降。阈值已飙升至 ${labState.currentThreshold.toFixed(1)}V。</div>`;
            }

            // 2. 检查刺激反应
            if (intensity < labState.currentThreshold) {
                fb += `<div class="text-slate-400"><b>【阈下刺激】</b> 当前设定电压（${intensity}V）低于现状所需的阈值（${labState.currentThreshold.toFixed(1)}V），无法引发动作电位。</div>`;
            } else {
                let maxV = labState.baseMaxV + (labState.currentThreshold - labState.baseThreshold);
                let intensityFb = intensity >= maxV 
                    ? `<span class="text-sky-300"><b>【最大刺激】</b> 神经干内所有运动纤维皆被激活，肌肉产生最大张力。</span>` 
                    : `<span class="text-sky-300"><b>【次最大刺激】</b> 电压增加招募了更多神经纤维同步兴奋（空间总和现象）。</span>`;
                
                let freqFb = "";
                if (!labState.isContinuous) {
                    freqFb = "单次刺激产生典型的单收缩曲线：潜伏期 $\\rightarrow$ 收缩期 $\\rightarrow$ 舒张期。";
                } else {
                    if (freq < 5) freqFb = "<b>【独立的单收缩】</b> 频率极低，肌肉在下次刺激前可完全舒张恢复。";
                    else if (freq >= 5 && freq <= 25) freqFb = "<b>【不完全强直收缩】</b> 刺激落在舒张期内，张力不断叠加（时间总和），呈锯齿状波浪曲线。";
                    else freqFb = "<b>【完全强直收缩】</b> 高频刺激落在收缩期内，张力平滑融合并维持在稳定最高状态。";
                }
                fb += `<div class="mt-1">${intensityFb} <br> ${freqFb}</div>`;
            }
            document.getElementById('theory-feedback').innerHTML = fb;
        }

        // ==================== 绘图与物理运算循环 ====================
        let lastTime = performance.now();

        function renderLoop(currentTime) {
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            // 1. 环境变因随时间演进 (干燥化：每秒扣 0.5%)
            labState.moisture = Math.max(0, labState.moisture - 0.005 * deltaTime);
            updateStatusUI();

            // 2. 处理连续刺激的触发
            if (labState.isContinuous) {
                const freq = parseFloat(document.getElementById('slider-frequency').value);
                const intensity = parseFloat(document.getElementById('slider-intensity').value);
                const period = 1000 / freq; 

                if (labState.time - labState.lastContStimTime >= period) {
                    addStimulus(intensity);
                    labState.lastContStimTime = labState.time;
                    if(Math.random() < 0.1) analyzeTheoryFeedback(intensity, freq); 
                }
            }

            // 3. 物理模型：计算当前总张力 (基于 Alpha Function 叠加)
            let currentTension = 0;
            
            // 清理过期的单次抽动事件 (节省运算资源)
            labState.twitches = labState.twitches.filter(t => (labState.time - t.startTime) < 1000);

            for (let t of labState.twitches) {
                let dt = labState.time - t.startTime;
                if (dt > 10) { // 潜伏期 10ms
                    let activeTime = dt - 10;
                    // f(t) = A * (t/tau) * e^(1 - t/tau)
                    let val = t.amplitude * (activeTime / t.tau) * Math.exp(1 - activeTime / t.tau);
                    if(val > 0) currentTension += val;
                }
            }

            // 软上限 (强直收缩最大张力极限)
            const maxTensionLimit = 3.5;
            if (currentTension > maxTensionLimit) {
                currentTension = maxTensionLimit + (currentTension - maxTensionLimit) * 0.05; 
            }
            if (currentTension < 0.005) currentTension = 0;

            // 4. 更新数据阵列与 UI
            historyData.push(currentTension);
            historyData.shift(); 

            let displayGrams = (currentTension * 10).toFixed(1);
            document.getElementById('disp-tension').innerText = displayGrams + ' g';
            document.getElementById('lab-timer').innerText = `Time: ${(labState.time/1000).toFixed(2)}s`;

            // ===== 5. 肌肉标本物理变形动画 =====
            const muscle = document.getElementById('muscle-belly');
            // 张力越大，肌肉越短 (scaleX 减小) 且越粗 (scaleY 增大)
            // 假设张力在 0 ~ 4.0 之间变动
            let scaleX = 1 - (currentTension * 0.06); 
            let scaleY = 1 + (currentTension * 0.12);
            muscle.style.transform = `scale(${scaleX}, ${scaleY})`;

            // ===== 6. 画布渲染 (示波器) =====
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 画网格线
            ctx.strokeStyle = 'rgba(51, 65, 85, 0.4)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for(let i=0; i<canvas.height; i+=40) { ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); }
            for(let i=0; i<canvas.width; i+=40) { ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); }
            ctx.stroke();

            // 画波形
            ctx.beginPath();
            ctx.strokeStyle = '#10b981'; // 荧光绿
            ctx.lineWidth = 2.5;
            ctx.lineJoin = 'round';
            
            const baseY = canvas.height - 30; 
            const scaleY_canvas = (canvas.height - 60) / 4.0; // Y轴比例

            for (let i = 0; i < canvas.width; i++) {
                let x = i;
                let y = baseY - (historyData[i] * scaleY_canvas);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();

            // 荧光效果
            ctx.filter = 'blur(4px)';
            ctx.strokeStyle = 'rgba(16, 185, 129, 0.5)';
            ctx.stroke();
            ctx.filter = 'none';

            labState.time += 16;
            requestAnimationFrame(renderLoop);
        }

        // 初始化启动
        setTimeout(() => {
            resizeCanvas();
            historyData = new Array(canvas.width).fill(0);
            updateStatusUI();
            updateMedLabUI();
            requestAnimationFrame(renderLoop);
        }, 100);

    </script>
</body>
</html>
